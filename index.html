#C01-07 Which of the following is considered a construction vehicle?

a) Truck tractor
b) Mobile truck crane
c) Grader
d) Truck-mounted backhoe

[Correct Answer]: c)
[Explain]: construction vehicle（工程车辆）包括 grader（平地机）等道路施工机械。
[Reference]: Chapter 1 – Construction Vehicles

#C01-08 What must applicants wear during a vision screening if required to meet standards?

a) Sunglasses
b) Welding goggles
c) Contact lenses or eyeglasses
d) Safety visor

[Correct Answer]: c)
[Explain]: 若申请人需要 contact lenses（隐形眼镜）或 eyeglasses（眼镜）才能达到视力标准，则在 vision screening（视力测试）时必须佩戴。
[Reference]: Chapter 1 – Vision Standards

#C01-09 What must happen after failing the air brake knowledge test three times?

a) Wait one year
b) Retake the road test
c) Complete or repeat an approved 7-hour air brake course
d) Reapply for Class 5

[Correct Answer]: c)
[Explain]: air brake knowledge test（气刹知识考试）连续三次不合格后，必须完成或重新参加 approved 7-hour air brake course（认可7小时气刹课程）。
[Reference]: Chapter 1 – Air Brake Training

#C01-10 What must you provide before getting a commercial class driver’s licence?

a) Employment contract
b) Fuel receipts
c) Acceptable driving record
d) Vehicle registration

[Correct Answer]: c)
[Explain]: 申请 commercial class driver’s licence（商业驾照）前，必须提供 acceptable driving record（合格驾驶记录）。
[Reference]: Chapter 1 – Driving Record Requirements

#C01-11 What must carriers do regarding a driver’s driving record?

a) Replace the licence yearly
b) Check the driving record before hiring and yearly afterward
c) Provide free insurance
d) Conduct annual road tests

[Correct Answer]: b)
[Explain]: carrier（运输公司）必须在聘用前检查 driving record（驾驶记录），并在聘用后每年再次检查。
[Reference]: Chapter 1 – Carrier Responsibilities

#C01-12 In what language is the commercial licensing process conducted?

a) French only
b) English only
c) Chinese and English
d) Any language with interpreter

[Correct Answer]: b)
[Explain]: commercial licensing process（商业驾照流程）全部以 English（英语）进行。
[Reference]: Chapter 1 – Licensing Process

#C01-13 Which organization provides information about medical and vision standards?

a) RCMP
b) RoadSafetyBC
c) Canada Post
d) WorkSafeBC

[Correct Answer]: b)
[Explain]: medical and vision standards（医疗与视力标准）相关信息由 RoadSafetyBC 提供。
[Reference]: Chapter 1 – Medical Standards

#C01-14 What determines knowledge and road test fees?

a) Driver age
b) Vehicle colour
c) Type of tests taken
d) Insurance history

[Correct Answer]: c)
[Explain]: knowledge test（笔试）与 road test（路考）费用取决于考试类型。
[Reference]: Chapter 1 – Test Fees

#C01-15 Who is responsible for ensuring a road test vehicle is properly insured?

a) ICBC
b) The examiner
c) The driver
d) The mechanic

[Correct Answer]: c)
[Explain]: 驾驶员（driver）必须确保 road test（路考）车辆具有有效保险。
[Reference]: Chapter 1 – Insurance Responsibility

#C01-16 What does the National Safety Code establish?

a) Fuel economy limits
b) Minimum safety standards
c) Tire brand requirements
d) Highway toll fees

[Correct Answer]: b)
[Explain]: National Safety Code（国家安全规范）为 commercial drivers（商业驾驶员）、vehicles（车辆）和 carriers（运输公司）设定最低安全标准。
[Reference]: Chapter 1 – National Safety Code

#C01-17 What is required to take a road test in an air-brake-equipped vehicle?

a) Motorcycle endorsement
b) Passenger endorsement
c) Air brake endorsement or approved course completion
d) No additional requirement

[Correct Answer]: c)
[Explain]: 使用 equipped with air brakes（配备气刹）的车辆参加路考时，必须拥有 air brake endorsement（气刹资格）或完成 approved course（认可课程）。
[Reference]: Chapter 1 – Air Brake Road Test

#C01-18 What restriction applies if you take a Class 1, 2 or 3 road test with an automatic transmission?

a) No trailer towing
b) Automatic transmission only restriction
c) Daytime driving only
d) Highway restriction

[Correct Answer]: b)
[Explain]: 若使用 automatic transmission（自动挡）车辆参加路考，则驾照会被限制为只能驾驶自动挡车辆。
[Reference]: Chapter 1 – Automatic Transmission Restriction

#C01-19 What may seasonal axle weight restrictions affect during a road test?

a) Tire pressure
b) Vehicle colour
c) Vehicle weight allowed on the road test
d) Seatbelt use

[Correct Answer]: c)
[Explain]: seasonal axle weight restrictions（季节性轴重限制）会限制 road test（路考）车辆允许的总重量。
[Reference]: Chapter 1 – Seasonal Weight Restrictions

#C01-20 What is expected of ICBC licensed driving schools and instructors?

a) To repair vehicles
b) To operate lawfully and ethically
c) To issue licences directly
d) To inspect highways

[Correct Answer]: b)
[Explain]: ICBC 要求 Driver Training Schools（驾驶培训学校）及 instructors（教练）依法并以 ethical manner（符合道德的方式）运营。
[Reference]: Chapter 1 – Driving School Code of Conduct

#C01-21 Where can drivers look for an air brake course?

a) Grocery stores
b) Online or community colleges
c) Gas stations
d) Tire warehouses

[Correct Answer]: b)
[Explain]: air brake course（气刹课程）可在线、通过电话簿或在 community colleges（社区学院）寻找。
[Reference]: Chapter 1 – Air Brake Courses

#C01-22 Which drivers must regularly submit a Driver’s Medical Examination Report?

a) Motorcycle learners only
b) Class 1–4 and certain endorsement holders
c) Taxi passengers
d) Bicycle riders

[Correct Answer]: b)
[Explain]: Class 1–4 驾驶员及部分 endorsement（资格）持有人必须定期提交 Driver’s Medical Examination Report（驾驶员体检报告）。
[Reference]: Chapter 1 – Medical Examination Requirements

#C02-01 What converts the energy of motion into heat energy during braking?

a) Compression
b) Lubrication
c) Friction
d) Gravity

[Correct Answer]: c)
[Explain]: braking system（制动系统）的基本原理是 friction（摩擦）将 motion energy（运动能量）转化为 heat energy（热能）。
[Reference]: Chapter 2 – Braking Principles

#C02-02 What is the final factor in stopping a vehicle?

a) Engine power
b) Tire contact with the road
c) Fuel level
d) Transmission type

[Correct Answer]: b)
[Explain]: 车辆最终能否停车，取决于 tires（轮胎）与 road surface（路面）之间的接触与 traction（抓地力）。
[Reference]: Chapter 2 – Tire Traction

#C02-03 What is the average driver reaction time?

a) 1/10 second
b) 1/4 second
c) 3/4 second
d) 2 seconds

[Correct Answer]: c)
[Explain]: average driver reaction time（平均驾驶员反应时间）约为 3/4 second。
[Reference]: Chapter 2 – Reaction Time

#C02-04 Which factors make up total stopping time?

a) Engine time and tire time
b) Perception time, reaction time, brake lag time and braking time
c) Fuel time and parking time
d) Steering time and loading time

[Correct Answer]: b)
[Explain]: total stopping time（总停车时间）包括 perception time（感知时间）、reaction time（反应时间）、brake lag time（刹车延迟时间）与 braking time（制动时间）。
[Reference]: Chapter 2 – Total Stopping Time

#C02-05 What can increase total stopping time?

a) Properly adjusted brakes
b) Driving uphill
c) Incorrectly adjusted brakes or driving on a downgrade
d) Using a tachometer

[Correct Answer]: c)
[Explain]: 若 brakes（刹车）调整不正确，或车辆在 downgrade（下坡）状态下行驶，则 total stopping time（总停车时间）会增加。
[Reference]: Chapter 2 – Brake Adjustment and Downgrades

#C02-06 What does total stopping distance depend on?

a) Paint colour and fuel type
b) Brake friction, drum heat dissipation and tire grip
c) Radio volume and engine size
d) Seat position and mirror angle

[Correct Answer]: b)
[Explain]: total stopping distance（总停车距离）取决于 brake linings/pads（刹车片）的摩擦能力、brake drums（制动鼓）的散热能力以及 tires（轮胎）的抓地能力。
[Reference]: Chapter 2 – Stopping Distance

#C02-07 What should drivers always allow enough of while driving?

a) Fuel pressure
b) Engine temperature
c) Following distance or time
d) Transmission fluid

[Correct Answer]: c)
[Explain]: 驾驶时应保持足够 following distance（跟车距离）与时间，并选择能够安全停车的车速。
[Reference]: Chapter 2 – Safe Following Distance

#C02-08 According to police-reported collision statistics, what are the top two factors assigned to commercial drivers in casualty crashes?

a) Tire wear and bad weather
b) Driving without due care and unsafe speed
c) Poor lighting and road construction
d) Transmission failure and brake noise

[Correct Answer]: b)
[Explain]: 在警方记录的 commercial driver（商业驾驶员）伤亡事故中，driving without due care and attention（未尽注意义务）与 unsafe speed（不安全车速）是最主要因素。
[Reference]: Chapter 2 – Collision Statistics

#C02-09 Why does a truck take longer to stop than a car, especially downhill?

a) Trucks use smaller brakes
b) Trucks have less traction
c) Trucks are heavier and require more stopping distance
d) Trucks cannot use retarders

[Correct Answer]: c)
[Explain]: truck（卡车）重量更大，因此需要更长 stopping distance（停车距离），尤其在 downhill（下坡）时更明显。
[Reference]: Chapter 2 – Heavy Vehicle Stopping Distance

#C02-10 What is brake fade?

a) Brake colour change
b) Loss of braking effectiveness due to overheating
c) Tire vibration during braking
d) Automatic brake adjustment

[Correct Answer]: b)
[Explain]: brake fade（刹车衰减）是由于 brakes（刹车）过热而导致制动效果下降，严重时甚至可能无法停车。
[Reference]: Chapter 2 – Brake Fade

#C02-11 What temperature should most brake components not exceed?

a) 80°C
b) 120°C
c) 250°C
d) 500°C

[Correct Answer]: c)
[Explain]: 大多数 brake components（制动部件）的工作温度不应超过 250°C。
[Reference]: Chapter 2 – Brake Temperature

#C02-12 What do retarders do?

a) Increase engine speed
b) Cool brake drums
c) Provide an auxiliary slowing effect
d) Inflate air tanks

[Correct Answer]: c)
[Explain]: retarders（缓速器）提供 auxiliary slowing effect（辅助减速效果），帮助 main brake system（主制动系统）减慢车辆。
[Reference]: Chapter 2 – Retarders

#C02-13 What should drivers do before operating a retarding device?

a) Increase tire pressure
b) Read the manufacturer’s operating procedures
c) Disconnect ABS
d) Drain the reservoirs

[Correct Answer]: b)
[Explain]: 使用 retarding device（缓速装置）前，必须熟悉 manufacturer’s operating procedures（制造商操作程序）。
[Reference]: Chapter 2 – Retarder Operation

#C02-14 What does r.p.m. stand for?

a) Rear pressure mechanism
b) Revolutions per minute
c) Rotational power measure
d) Road performance monitor

[Correct Answer]: b)
[Explain]: r.p.m. 代表 revolutions per minute（每分钟转数），表示 crankshaft（曲轴）每分钟完成的旋转次数。
[Reference]: Chapter 2 – Engine RPM

#C02-15 What may happen if brakes are not adjusted correctly or not performing adequately?

a) Lower insurance rates
b) Fuel savings
c) A fine of up to $2,000
d) Automatic licence renewal

[Correct Answer]: c)
[Explain]: 若 brakes（刹车）调整不正确或制动性能不足，驾驶员可能被罚款最高 $2,000。
[Reference]: Chapter 2 – Brake Penalties

#C02-16 When should drivers put on tire chains?

a) After spinning out on a hill
b) Only after a crash
c) Before losing traction on a hill
d) Only while moving

[Correct Answer]: c)
[Explain]: 不应等到在山路打滑后才安装 tire chains（防滑链），应提前在 designated chain-up area（指定装链区）安装。
[Reference]: Chapter 2 – Tire Chains

#C02-17 What can frequent use of service brakes cause?

a) Better fuel economy
b) Brake fade
c) Lower engine RPM
d) Tire expansion

[Correct Answer]: b)
[Explain]: 频繁使用 service brakes（行车制动）会导致刹车过热，并可能造成 brake fade（刹车衰减）。
[Reference]: Chapter 2 – Service Brake Overheating

#C02-18 What does a higher percentage on a steep hill sign indicate?

a) Better road condition
b) Lower fuel consumption
c) A steeper hill
d) Higher speed limit

[Correct Answer]: c)
[Explain]: steep hill sign（陡坡警示牌）上的百分比越高，表示 hill（坡道）越陡。
[Reference]: Chapter 2 – Steep Hill Signs

#C02-19 When are engine retarders most effective?

a) At idle speed
b) At high RPM and in a low gear
c) In neutral gear
d) During parking

[Correct Answer]: b)
[Explain]: engine retarders（发动机缓速器）在 higher r.p.m.（较高转速）及 low gear（低挡位）时效果最佳。
[Reference]: Chapter 2 – Engine Retarder Effectiveness

#C02-20 What should drivers always obey in mountain driving areas?

a) Fuel stop signs
b) Parking restriction signs
c) Stop and check brakes signs
d) Detour signs

[Correct Answer]: c)
[Explain]: 驾驶员必须遵守 stop and check brakes（停车检查刹车）标志。
[Reference]: Chapter 2 – Brake Check Signs

#C02-21 What is a full jackknife?

a) A broken trailer axle
b) A tractor and trailer forming an angle of 90 degrees or less
c) A brake drum explosion
d) A detached air line

[Correct Answer]: b)
[Explain]: full jackknife（完全折刀）是 tractor（牵引车）与 trailer（挂车）之间形成约90度或更小夹角的危险状态。
[Reference]: Chapter 2 – Full Jackknife

#C02-22 What is a good way to become familiar with ABS?

a) Disable the ABS system
b) Practice using ABS
c) Inflate tires above specification
d) Avoid emergency braking

[Correct Answer]: b)
[Explain]: 建议驾驶员 practice using ABS（练习使用ABS），以熟悉其工作方式与制动感觉。
[Reference]: Chapter 2 – ABS Practice

#C08-01 What force multiplication can 100 p.s.i. of air pressure produce in a brake chamber?

a) 300 pounds
b) 1,000 pounds
c) 3,000 pounds
d) 10,000 pounds

[Correct Answer]: c)
[Explain]: 通过 force multiplication（力放大），100 p.s.i. 的 air pressure（气压）可产生约 3,000 pounds 的 pushrod force（推杆力量）。
[Reference]: Chapter 8 – Brake Chamber Force

#C08-02 What causes the pushrod to extend out of the brake chamber?

a) Tire rotation
b) Spring tension
c) Compressed air acting on the diaphragm
d) Axle movement

[Correct Answer]: c)
[Explain]: compressed air（压缩空气）作用于 diaphragm（膜片）后，会推动 pushrod（推杆）从 brake chamber（制动气室）中伸出。
[Reference]: Chapter 8 – Brake Chamber Operation

#C08-03 What does foundation brake refer to?

a) Steering linkage
b) Suspension components
c) Mechanical brake parts inside the wheel
d) Air reservoirs only

[Correct Answer]: c)
[Explain]: foundation brake（基础制动系统）指 wheel（车轮）内部的机械制动部件。
[Reference]: Chapter 8 – Foundation Brake

#C08-04 What happens when air pressure acts on the brake chamber diaphragm?

a) The tire inflates
b) The pushrod moves the slack adjuster and rotates the s-cam
c) The governor unloads
d) The reservoir drains

[Correct Answer]: b)
[Explain]: 当 air pressure（气压）作用于 brake chamber diaphragm（制动气室膜片）时，会推动 pushrod（推杆）、slack adjuster arm（间隙调节臂）并转动 s-cam 来施加刹车。
[Reference]: Chapter 8 – Brake Application

#C08-05 How should belt tension be checked?

a) Twist the belt sideways
b) Press midway between the pulleys
c) Remove the belt
d) Measure air pressure

[Correct Answer]: b)
[Explain]: 检查 belt tension（皮带张力）时，应在两个 pulley（皮带轮）中间按压皮带。
[Reference]: Chapter 8 – Belt Tension Inspection

#C08-06 What happens during the compression stroke of an air compressor?

a) The inlet valve opens and air exits
b) The discharge valve closes
c) The inlet valve closes and compressed air moves toward the reservoir
d) Air bypasses the compressor

[Correct Answer]: c)
[Explain]: 在 compression stroke（压缩冲程）中，inlet valve（进气阀）关闭，discharge valve（排气阀）打开，compressed air（压缩空气）被输送至 reservoir（储气罐）。
[Reference]: Chapter 8 – Air Compressor Operation

#C08-07 What is the approximate maximum operating pressure of many current air brake systems?

a) 60 p.s.i.
b) 80 p.s.i.
c) 100 p.s.i.
d) 125 p.s.i.

[Correct Answer]: d)
[Explain]: 许多现代 air brake systems（气刹系统）的最大工作压力约为 125 p.s.i.
[Reference]: Chapter 8 – Air Pressure Limits

#C08-08 At what pressure must the governor allow the compressor to resume compressing air?

a) Below 20 p.s.i.
b) Below 60 p.s.i.
c) Below 80 p.s.i.
d) Below 125 p.s.i.

[Correct Answer]: c)
[Explain]: governor（调压器）必须在 air pressure（气压）低于 80 p.s.i. 时，使 compressor（空气压缩机）重新开始工作。
[Reference]: Chapter 8 – Governor Settings

#C08-09 How quickly must the compressor build pressure from 50 p.s.i. to 90 p.s.i. at fast idle?

a) Within 30 seconds
b) Within 1 minute
c) Within 3 minutes
d) Within 10 minutes

[Correct Answer]: c)
[Explain]: compressor（空气压缩机）必须能够在 fast idle（高速怠速）下，于三分钟内将 reservoir（储气罐）压力从 50 p.s.i. 提升至 90 p.s.i.
[Reference]: Chapter 8 – Compressor Performance

#C08-10 What is another name for a safety valve?

a) Relay valve
b) Pop-off valve
c) Foot valve
d) Hand valve

[Correct Answer]: b)
[Explain]: safety valve（安全阀）有时也称为 pop-off valve（泄压阀）。
[Reference]: Chapter 8 – Safety Valve

#C08-11 What should drivers do when draining air reservoirs?

a) Drain quickly and leave immediately
b) Allow plenty of time for complete draining
c) Keep the engine at full throttle
d) Apply the hand valve

[Correct Answer]: b)
[Explain]: 排放 reservoir（储气罐）空气时，应给予足够时间让空气完全排空。
[Reference]: Chapter 8 – Reservoir Draining

#C08-12 Why should drivers stay out of the direct path of compressed air when draining reservoirs?

a) It may damage the tires
b) Compressed air can injure the eyes and ears
c) It reduces fuel economy
d) It affects the governor

[Correct Answer]: b)
[Explain]: compressed air（压缩空气）泄漏时可能伤害 eyes（眼睛）与 ears（耳朵）。
[Reference]: Chapter 8 – Compressed Air Warning

#C08-13 What limits the maximum brake application pressure?

a) Tire pressure
b) Reservoir pressure
c) Engine RPM
d) Axle weight

[Correct Answer]: b)
[Explain]: 最大 brake application（制动施加压力）不会超过 reservoir（储气罐）中的 air pressure（气压）。
[Reference]: Chapter 8 – Brake Application Pressure

#C08-14 What happens when the driver releases the foot valve?

a) Air enters the brake chambers
b) Air pressure exhausts into the atmosphere
c) Reservoir pressure doubles
d) The governor unloads

[Correct Answer]: b)
[Explain]: 当驾驶员释放 foot valve（脚控制阀）时，brake chambers（制动气室）中的空气会排放到大气中。
[Reference]: Chapter 8 – Foot Valve Release

#C08-15 Why have cars used dual braking systems since 1968?

a) To increase speed
b) To reduce fuel consumption
c) To reduce the chance of total brake failure
d) To improve steering

[Correct Answer]: c)
[Explain]: dual braking systems（双回路制动系统）可降低 total brake failure（完全制动失效）的风险。
[Reference]: Chapter 8 – Dual Braking Systems

#C08-16 What may some reservoirs contain?

a) More than one compartment
b) Engine coolant
c) Hydraulic fluid only
d) Fuel filters

[Correct Answer]: a)
[Explain]: 某些 reservoirs（储气罐）具有多个 compartment（隔舱），因此也可能有多个 drain cock（排水阀）。
[Reference]: Chapter 8 – Reservoir Compartments

#C08-17 Why should drivers frequently check gauges?

a) To monitor fuel economy
b) To ensure enough air pressure for braking
c) To reduce engine RPM
d) To check tire temperature

[Correct Answer]: b)
[Explain]: 应经常检查 gauges（仪表），确保有足够 air pressure（气压）用于刹车。
[Reference]: Chapter 8 – Gauge Monitoring

#C08-18 When must the low-air warning device activate?

a) Below 20 p.s.i.
b) Below 40 p.s.i.
c) Below 60 p.s.i.
d) Below 125 p.s.i.

[Correct Answer]: c)
[Explain]: 当 air pressure（气压）低于 60 p.s.i. 时，low-air warning device（低气压警报装置）必须启动。
[Reference]: Chapter 8 – Low-Air Warning Device

#C08-19 What should you do if the low-air warning comes on?

a) Continue driving carefully
b) Increase speed
c) Pull over and stop
d) Shift to neutral

[Correct Answer]: c)
[Explain]: 若 low-air warning（低气压警报）启动，应立即靠边停车，并确认 air brake system（气刹系统）安全后才能继续行驶。
[Reference]: Chapter 8 – Low-Air Warning Response

#C08-20 Despite a loss of primary reservoir pressure, what may still operate?

a) Rear trailer brakes only
b) Front secondary brakes
c) The compressor only
d) Parking brakes only

[Correct Answer]: b)
[Explain]: 即使 primary reservoir（主储气罐）失去压力，front brakes（前轮/secondary brakes）仍可工作。
[Reference]: Chapter 8 – Dual Air System Operation

#C08-21 What happens if air pressure falls beneath a certain level?

a) The compressor stops permanently
b) Spring parking brakes apply automatically
c) Tire pressure increases
d) The steering locks

[Correct Answer]: b)
[Explain]: 当 air pressure（气压）低于一定水平时，spring parking brakes（弹簧驻车制动）会自动施加。
[Reference]: Chapter 8 – Spring Parking Brakes

#C08-22 What does the effectiveness of spring parking brakes depend on?

a) Fuel level
b) Tire brand
c) Proper brake adjustment
d) Engine temperature

[Correct Answer]: c)
[Explain]: spring parking brakes（弹簧驻车制动）的效果取决于 brakes（刹车）是否保持良好 adjustment（调整状态）。
[Reference]: Chapter 8 – Spring Brake Adjustment

#C08-23 Why should drivers stay away from damaged spring parking brake chambers?

a) They may leak coolant
b) The spring can break out and cause serious injury
c) They reduce fuel economy
d) They interfere with ABS

[Correct Answer]: b)
[Explain]: spring parking brake（弹簧驻车制动）内部弹簧力量极强，若 chamber（气室）损坏，弹簧可能弹出并造成严重伤害。
[Reference]: Chapter 8 – Spring Brake Warning

#C08-24 In some systems, when may spring parking brakes begin to apply?

a) At 20 p.s.i.
b) At 40 p.s.i.
c) At 60 p.s.i.
d) At 90 p.s.i. or higher

[Correct Answer]: d)
[Explain]: 某些系统中，spring parking brakes（弹簧驻车制动）可能在 90 p.s.i. 或更高压力时开始逐渐施加。
[Reference]: Chapter 8 – Gradual Spring Brake Application

#C08-25 When should caging spring parking brakes be done?

a) During every inspection
b) Only in an emergency
c) Whenever parking
d) Before coupling

[Correct Answer]: b)
[Explain]: 只有在 emergency（紧急情况）下才应 cage（机械固定）spring parking brakes（弹簧驻车制动）。
[Reference]: Chapter 8 – Caging Spring Brakes

#C08-26 What happens after a spring brake chamber is caged?

a) Tire pressure increases
b) The wheel loses parking brake force
c) The reservoir drains automatically
d) ABS becomes disabled

[Correct Answer]: b)
[Explain]: 一旦 spring brake chamber（弹簧制动气室）被 cage，该车轮将失去 parking brake force（驻车制动力）。
[Reference]: Chapter 8 – Caged Brake Chambers

#C08-27 What does a two-way check valve do?

a) Releases ABS pressure
b) Draws air from the tank with the highest pressure
c) Measures brake temperature
d) Controls engine RPM

[Correct Answer]: b)
[Explain]: two-way check valve（双向止回阀）会从 pressure（压力）最高的 tank（储气罐）取气。
[Reference]: Chapter 8 – Two-Way Check Valve

#C08-28 How can drivers check whether a two-way check valve is working properly?

a) Increase tire pressure
b) Drain the primary reservoir and check for pressure bleed-back
c) Disconnect the compressor
d) Apply the hand valve repeatedly

[Correct Answer]: b)
[Explain]: 可通过排空 primary reservoir（主储气罐），检查 secondary reservoir（副储气罐）气压是否回流，来测试 two-way check valve（双向止回阀）。
[Reference]: Chapter 8 – Two-Way Check Valve Test

#C08-29 What is another name for the supply line?

a) Service line
b) Emergency line
c) Foot valve line
d) Relay line

[Correct Answer]: b)
[Explain]: supply line（供气管）也称为 emergency line（紧急供气管）。
[Reference]: Chapter 8 – Trailer Air Lines

#C08-30 What is another name for the control line?

a) Emergency line
b) Governor line
c) Service line
d) Reservoir line

[Correct Answer]: c)
[Explain]: control line（控制管）也称为 service line（行车制动控制管）。
[Reference]: Chapter 8 – Trailer Air Lines

#C08-31 Why should glad hands be connected to dummy couplers or to each other when not in use?

a) To increase fuel efficiency
b) To prevent dirt and debris from entering the air lines
c) To reduce tire wear
d) To cool the reservoirs

[Correct Answer]: b)
[Explain]: 未使用时，glad hands（气路接头）应连接至 dummy couplers（封闭接头）或彼此连接，以防 dirt and debris（灰尘杂物）进入 air lines（气管）。
[Reference]: Chapter 8 – Glad Hands

#C08-32 Why should glad hands and air lines be secured properly?

a) To improve steering
b) To prevent chafing and bouncing damage
c) To increase reservoir pressure
d) To reduce RPM

[Correct Answer]: b)
[Explain]: 应固定 glad hands（气路接头）与 air lines（气管），防止与其他部件摩擦或甩动碰撞。
[Reference]: Chapter 8 – Glad Hand Safety

#C08-33 What can happen if a trailer system without spring parking brakes develops a small leak?

a) Tire pressure rises
b) The parked trailer may roll away
c) ABS automatically applies
d) The governor unloads

[Correct Answer]: b)
[Explain]: 没有 spring parking brakes（弹簧驻车制动）的 trailer system（挂车系统）若发生漏气，可能导致 parked trailer（停放挂车）滑动。
[Reference]: Chapter 8 – Trailer Leak Warning

#C08-34 What should always be done when parking a trailer?

a) Disconnect the compressor
b) Block the wheels
c) Remove the glad hands
d) Release the brakes

[Correct Answer]: b)
[Explain]: 停放挂车时必须 block the wheels（阻挡车轮），防止车辆滑动。
[Reference]: Chapter 8 – Trailer Parking Safety

#C08-35 What may indicate that the supply line and service line connections are reversed?

a) Faster brake response
b) Trailer service brakes will not function
c) Higher reservoir pressure
d) Lower fuel consumption

[Correct Answer]: b)
[Explain]: 若接反 supply line（供气管）与 service line（控制管），可能导致 trailer service brakes（挂车行车制动）无法工作。
[Reference]: Chapter 8 – Reversed Air Lines

#C08-36 What test should always be performed after coupling a tractor to a trailer?

a) RPM test
b) Tug test
c) Brake fade test
d) Governor test

[Correct Answer]: b)
[Explain]: tractor（牵引车）连接 trailer（挂车）后，必须进行 tug test（拉拽测试）。
[Reference]: Chapter 8 – Tug Test

#C08-37 Before conducting a tug test, what should the driver visually confirm?

a) Tire pressure
b) Fuel level
c) Fifth wheel locking jaws are closed and locked
d) Reservoir temperature

[Correct Answer]: c)
[Explain]: tug test（拉拽测试）前，应确认 fifth wheel locking jaws（鞍座锁爪）已闭合并锁定。
[Reference]: Chapter 8 – Fifth Wheel Inspection

#C08-38 What can cause trailer spring parking brakes to apply automatically?

a) A broken supply line
b) A loose mirror
c) Excess fuel pressure
d) A discharged battery

[Correct Answer]: a)
[Explain]: supply line（供气管）断裂会导致 trailer spring parking brakes（挂车弹簧驻车制动）自动施加。
[Reference]: Chapter 8 – Trailer Spring Brake Application

#C08-39 When may a peace officer place a vehicle out of service?

a) When tire pressure is low
b) When the tractor protection system allows pressure below 20 p.s.i. without automatic valve closure
c) When ABS lights turn on
d) When the engine idles too high

[Correct Answer]: b)
[Explain]: 若 tractor protection system（牵引车保护系统）允许 tractor pressure（牵引车气压）低于 20 p.s.i. 时，trailer air supply valve（挂车供气阀）仍未自动关闭，车辆可能被判定 out of service（停运）。
[Reference]: Chapter 8 – Tractor Protection System

#C08-40 Why must the hand valve not be used for parking?

a) It damages the compressor
b) It increases fuel use
c) It is unsafe for parking
d) It disables ABS

[Correct Answer]: c)
[Explain]: hand valve（手控制阀）不应用于 parking（驻车），应使用 tractor parking brakes（牵引车驻车制动）并阻挡挂车车轮。
[Reference]: Chapter 8 – Hand Valve Warning

#C08-41 What is driving a tractor without a trailer attached called?

a) Jackknifing
b) Coupling
c) Bobtailing
d) Dynamiting

[Correct Answer]: c)
[Explain]: 驾驶未连接 trailer（挂车）的 tractor（牵引车）称为 bobtailing（空车头行驶）。
[Reference]: Chapter 8 – Bobtailing

#C08-42 On vehicles with a manual front wheel limiting valve, what position should normally be used?

a) Slippery Road
b) Emergency
c) Normal (Dry Road)
d) Parking

[Correct Answer]: c)
[Explain]: 配备 manual front wheel limiting valve（手动前轮限制阀）的车辆，应保持在 normal（Dry Road）位置以确保正常 braking efficiency（制动效率）。
[Reference]: Chapter 8 – Front Wheel Limiting Valve

#C08-43 When may the Slippery Road position be used under the Motor Vehicle Act?

a) At any time
b) Only when weather conditions make it essential for safety
c) Only during inspections
d) Only while parking

[Correct Answer]: b)
[Explain]: 根据 Motor Vehicle Act，仅在天气条件确有必要时，才可使用 Slippery Road 模式。
[Reference]: Chapter 8 – Slippery Road Position

#C08-44 What is another name for spring parking brake emergency release systems?

a) Dual brake systems
b) California spring parking brake systems
c) ABS override systems
d) Relay brake systems

[Correct Answer]: b)
[Explain]: spring parking brake emergency release systems（弹簧驻车制动紧急释放系统）有时称为 California spring parking brake systems。
[Reference]: Chapter 8 – Emergency Release Systems

#C08-45 What should ABS lights for the tractor and trailer do when the tractor is first started?

a) Stay off permanently
b) Flash once then remain off
c) Turn on initially
d) Sound a buzzer only

[Correct Answer]: c)
[Explain]: 首次启动 tractor（牵引车）时，tractor 与 trailer 的 ABS lights（ABS警示灯）应亮起。
[Reference]: Chapter 8 – ABS Warning Lights

#C08-46 Why should drivers check whether a trailer is equipped with ABS?

a) ABS-equipped combination units stop differently in emergencies
b) ABS reduces fuel consumption
c) ABS increases RPM
d) ABS replaces service brakes

[Correct Answer]: a)
[Explain]: 所有单元均 equipped with ABS（配备ABS）的 combination unit（组合车辆）在 emergency stop（紧急制动）时，与未全部配备 ABS 的组合车辆表现明显不同。
[Reference]: Chapter 8 – ABS Combination Units

#C08-47 Where is a trailer ABS warning light commonly positioned?

a) Under the trailer
b) Inside the reservoir
c) On the rear side of the trailer
d) On the steering wheel

[Correct Answer]: c)
[Explain]: trailer ABS warning light（挂车ABS警示灯）通常位于 trailer（挂车）后侧，驾驶员应能通过 side mirror（后视镜）观察到。
[Reference]: Chapter 8 – Trailer ABS Warning Light

#C09-01 Who is ultimately responsible for ensuring the brakes operate properly before the vehicle is moved?

a) Maintenance crew
b) Carrier manager
c) Driver
d) Police officer

[Correct Answer]: c)
[Explain]: 即使公司有 maintenance crew（维修团队），最终负责确保 brakes（刹车）正常工作的仍是 driver（驾驶员）。
[Reference]: Chapter 9 – Driver Responsibility

#C09-02 What may happen if you operate a vehicle with defective brakes?

a) Fuel economy improves
b) You may be fined up to $2,000
c) Your licence is upgraded
d) Tire pressure increases

[Correct Answer]: b)
[Explain]: 若驾驶 defective brakes（有缺陷刹车）的车辆，可能被罚款最高 $2,000，其中包括 excessive brake chamber pushrod stroke（制动气室推杆行程过大）。
[Reference]: Chapter 9 – Brake Defects

#C09-03 What is a common cause of brake failure in air-brake-equipped vehicles?

a) Excessive fuel pressure
b) Poor maintenance and failure to check pushrod travel
c) Oversized tires
d) Engine overheating

[Correct Answer]: b)
[Explain]: air-brake-equipped vehicles（配备气刹车辆）很少真正“失去刹车”，若发生问题，通常原因是 brake system（制动系统）维护不良，以及驾驶员未定期检查 brake pushrod travel（刹车推杆行程）。
[Reference]: Chapter 9 – Brake Maintenance

#C09-04 What can happen when a brake drum becomes overheated?

a) Tire pressure increases
b) Brake linings no longer contact the drum
c) Reservoir pressure rises
d) ABS disengages

[Correct Answer]: b)
[Explain]: 当 brake drum（制动鼓）过热时，brake linings（制动衬片）可能无法再接触 drum（制动鼓），并导致 brake chamber（制动气室）bottomed out（行程到底）。
[Reference]: Chapter 9 – Overheated Brakes

#C09-05 Why are incorrectly adjusted brakes dangerous?

a) They only affect fuel economy
b) They may seem normal during light braking but become dangerous during heavy braking or downgrades
c) They improve stopping distance
d) They prevent ABS operation

[Correct Answer]: b)
[Explain]: 即使 brakes（刹车）调整不正确，在 light braking（轻踩刹车）时也可能看似正常，但在 moderate to heavy braking（中重度制动）或 downgrade（下坡）时会非常危险。
[Reference]: Chapter 9 – Incorrect Brake Adjustment

#C09-06 What should always be done before checking brakes?

a) Increase engine RPM
b) Block the wheels
c) Drain the fuel tank
d) Release all brakes

[Correct Answer]: b)
[Explain]: 检查 brakes（刹车）前，必须先 block the wheels（阻挡车轮），防止车辆移动。
[Reference]: Chapter 9 – Brake Inspection Safety

#C09-07 Why should the engine be turned off when checking brakes?

a) To cool the reservoirs
b) To improve fuel economy
c) To listen for air leaks
d) To reset the governor

[Correct Answer]: c)
[Explain]: 检查 brakes（刹车）时关闭 engine（发动机），可更容易听到 air leaks（漏气声）。
[Reference]: Chapter 9 – Air Leak Inspection

#C09-08 While checking air brakes, what should drivers also inspect?

a) Seat position
b) Radio settings
c) Brake component wear and excessive play
d) Fuel injectors

[Correct Answer]: c)
[Explain]: 检查 air brakes（气刹）时，还应检查 s-cam bushing wear（S凸轮衬套磨损）、slack adjuster play（间隙调节器间隙）等 brake component wear（制动部件磨损）问题。
[Reference]: Chapter 9 – Brake Component Inspection

#C09-09 What equipment is recommended for checking brakes?

a) Flashlight, ruler, pry tool and wrench
b) Fuel hose and tire chains
c) Hydraulic jack only
d) Air compressor only

[Correct Answer]: a)
[Explain]: 检查 brakes（刹车）时建议准备 flashlight（手电筒）、ruler（尺）、pry tool（撬动工具）与 wrench（扳手）等工具。
[Reference]: Chapter 9 – Brake Inspection Equipment

#C09-10 What does a visible red marking on the pushrod indicate?

a) Proper brake adjustment
b) Low reservoir pressure
c) The brake is dangerously out of adjustment
d) ABS malfunction

[Correct Answer]: c)
[Explain]: 若 pushrod（推杆）上的 red marking（红色标记）可见，表示 brake（刹车）已 dangerously out of adjustment（严重失调）。
[Reference]: Chapter 9 – Pushrod Red Marking

#C09-11 What does it indicate if the pushrod goes into the chamber?

a) Tire wear
b) Previous slack adjustment was done incorrectly
c) Reservoir pressure is too high
d) The governor failed

[Correct Answer]: b)
[Explain]: 若 pushrod（推杆）被推进 chamber（气室）内部，表示之前 slack adjustment（间隙调整）不正确。
[Reference]: Chapter 9 – Incorrect Slack Adjustment

#C09-12 What should drivers have available when checking brakes?

a) Tire inflator
b) Adjusting wrench
c) Fuel additive
d) Relay valve

[Correct Answer]: b)
[Explain]: 检查 brakes（刹车）时，应准备 adjusting wrench（调节扳手），以便必要时进行 brake adjustment（刹车调整）。
[Reference]: Chapter 9 – Brake Adjustment Tools

#C09-13 Why must automatic slack adjusters still be checked regularly?

a) To improve fuel economy
b) To ensure correct adjustment is maintained
c) To increase tire life
d) To reduce engine RPM

[Correct Answer]: b)
[Explain]: automatic slack adjusters（自动间隙调节器）仍需定期检查，以确保 adjustment（调整）保持正确。
[Reference]: Chapter 9 – Automatic Slack Adjusters

#C09-14 Why is manually adjusting automatic slack adjusters dangerous?

a) It may reduce tire pressure
b) It can mask other problems and lead to brake failure
c) It increases fuel use
d) It damages the governor

[Correct Answer]: b)
[Explain]: 手动调整 automatic slack adjusters（自动间隙调节器）可能掩盖其他问题，并导致 brake failure（制动失效）。
[Reference]: Chapter 9 – Automatic Slack Adjuster Warning

#C09-15 Who should adjust or repair automatic slack adjusters?

a) Any driver
b) Fuel attendants
c) Qualified mechanics
d) Dispatchers

[Correct Answer]: c)
[Explain]: automatic slack adjusters（自动间隙调节器）只能由 qualified mechanic（合格技师）调整或维修。
[Reference]: Chapter 9 – Slack Adjuster Repair

#C09-16 What information can be found in service data books for automatic slack adjusters?

a) Fuel tax rates only
b) Lubrication, setup, inspection and testing information
c) Highway speed limits
d) Tire inflation charts

[Correct Answer]: b)
[Explain]: service data books（维修数据手册）包含 lubrication requirements（润滑要求）、initial setup（初始设定）、inspection（检查）与 testing（测试）等信息。
[Reference]: Chapter 9 – Service Data Books

#C09-17 When should manual adjustment procedures for automatic slack adjusters be used?

a) During daily inspections
b) Only in emergencies as a last resort
c) Whenever the driver prefers
d) During fueling

[Correct Answer]: b)
[Explain]: automatic slack adjusters（自动间隙调节器）的手动调整程序仅适用于 emergency（紧急情况）且无 qualified brake personnel（专业刹车人员）可到场时。
[Reference]: Chapter 9 – Emergency Adjustment Procedures

#C09-18 What is the only reliable way to verify brake adjustment?

a) Listening to the brakes
b) Watching the gauges
c) Physically checking brake adjustment
d) Measuring tire temperature

[Correct Answer]: c)
[Explain]: 没有任何方法能替代 physically checking brake adjustment（实际检查刹车调整）。
[Reference]: Chapter 9 – Physical Brake Inspection

#C10-01 Who is responsible for ensuring the vehicle is safe every time it is driven?

a) Employer
b) Mechanic
c) Driver
d) Police officer

[Correct Answer]: c)
[Explain]: National Safety Code（NSC，国家安全规范）要求 commercial vehicles（商用车辆）每日检查，而 driver（驾驶员）必须确保车辆每次驾驶时都安全。
[Reference]: Chapter 10 – Vehicle Responsibility

#C10-02 What is the purpose of a pre-trip inspection?

a) To improve fuel economy
b) To help ensure the vehicle is safe
c) To increase engine RPM
d) To reduce tire wear

[Correct Answer]: b)
[Explain]: pre-trip inspection（出车前检查）是为了帮助驾驶员确认 vehicle（车辆）处于安全状态。
[Reference]: Chapter 10 – Pre-trip Inspection

#C10-03 What should drivers ensure about the load they are carrying?

a) It is painted correctly
b) It is secure
c) It is refrigerated
d) It is insured

[Correct Answer]: b)
[Explain]: 驾驶员必须确保所载 load（货物）已经 secure（固定牢靠）。
[Reference]: Chapter 10 – Load Security

#C10-04 When checking underneath a truck and trailer, what should also be checked?

a) Radio volume
b) Brake adjustment
c) Fuel octane
d) Transmission oil colour

[Correct Answer]: b)
[Explain]: 在 truck（卡车）与 trailer（拖车）底部检查时，应检查 brake adjustment（刹车调整）。
[Reference]: Chapter 10 – Brake Adjustment Check

#C10-05 How should the fifth wheel connection be inspected?

a) From the driver seat only
b) With mirrors only
c) Using a flashlight from both sides and underneath
d) By listening for leaks

[Correct Answer]: c)
[Explain]: 应使用 flashlight（手电筒）从 tractor（牵引车）左右两侧及 trailer（拖车）底部检查 fifth wheel（鞍座）连接。
[Reference]: Chapter 10 – Fifth Wheel Inspection

#C10-06 Why should the engine be turned off when checking for air leakage?

a) To cool the brake drums
b) To listen more easily for leaks
c) To increase reservoir pressure
d) To reduce tire wear

[Correct Answer]: b)
[Explain]: 关闭 engine（发动机）后检查 air leakage（漏气），更容易听到 leaks（泄漏声）。
[Reference]: Chapter 10 – Air Leak Inspection

#C10-07 Why must spring brakes be released before making a heavy brake application?

a) To reduce tire wear
b) To avoid compounding the brakes
c) To improve fuel economy
d) To increase steering response

[Correct Answer]: b)
[Explain]: 在 heavy brake application（重踩刹车）前，必须确认 spring brakes（弹簧驻车制动）已释放，以避免 compounding the brakes（复合制动）。
[Reference]: Chapter 10 – Compounding the Brakes

#C10-08 When is it often easier to spot leaks and body damage?

a) While sitting in the cab
b) When underneath the vehicle
c) As you approach the vehicle
d) During fueling

[Correct Answer]: c)
[Explain]: 在接近 vehicle（车辆）时，通常比站在旁边更容易发现 leaks（泄漏）与 body damage（车身损坏）。
[Reference]: Chapter 10 – Visual Inspection

#C10-09 What should be checked while circling the vehicle during a pre-trip inspection?

a) Tires, wheels, mud flaps, suspension and brakes
b) Radio and heater controls
c) Fuel receipts
d) Windshield tint only

[Correct Answer]: a)
[Explain]: 绕车进行 pre-trip inspection（出车前检查）时，应检查 tire（轮胎）、wheel（车轮）、mud flap（挡泥板）、suspension（悬挂）、brake lines（制动管路）、brake chambers（制动气室）与 slack adjusters（间隙调节器）。
[Reference]: Chapter 10 – Circle Check

#C10-10 What should be done with the ignition keys while checking underneath the vehicle?

a) Leave them in the ignition
b) Give them to a passenger
c) Remove them from the ignition
d) Hang them on the mirror

[Correct Answer]: c)
[Explain]: 检查车底时，应从 ignition（点火开关）中移除钥匙，以防他人移动车辆。
[Reference]: Chapter 10 – Inspection Safety

#C10-11 When may a peace officer place a vehicle out of service due to brake lining thickness?

a) When brake drums are dirty
b) When drum brake linings are under 1/4 inch or air disc pads under 1/8 inch
c) When ABS lights are on
d) When tires are cold

[Correct Answer]: b)
[Explain]: 若 drum brake linings（鼓式刹车片）厚度低于 1/4 inch（6.4 mm），或 air disc brake pads（气压盘式刹车片）低于 1/8 inch（3.2 mm），车辆可能被 out of service（停止运营）。
[Reference]: Chapter 10 – Brake Lining Thickness

#C10-12 Within how long must air pressure build from 50 to 90 p.s.i.?

a) 30 seconds
b) 1 minute
c) 3 minutes
d) 10 minutes

[Correct Answer]: c)
[Explain]: 无论 air brake system（气刹系统）类型如何，压力都必须在三分钟内从 50 p.s.i. 增加至 90 p.s.i.
[Reference]: Chapter 10 – Air Pressure Build-up

#C10-13 What should drivers carry to clean vehicle light lenses?

a) Tire chains
b) Pry bar
c) Rag
d) Fuel hose

[Correct Answer]: c)
[Explain]: 驾驶员应携带 rag（抹布）清洁 lenses（灯罩），并确认 lights（灯光）正常工作。
[Reference]: Chapter 10 – Light Inspection

#C10-14 What emergency equipment is commonly carried on commercial vehicles?

a) Snow shovel and battery charger
b) Flags/flares, first aid kit and fire extinguisher
c) Tire inflator only
d) Hydraulic jack only

[Correct Answer]: b)
[Explain]: commercial vehicles（商用车辆）常见的 emergency equipment（紧急设备）包括 flags or flares（旗帜或警示火焰）、first aid kit（急救包）与 fire extinguisher（灭火器）。
[Reference]: Chapter 10 – Emergency Equipment

#C10-15 What may happen if you fail to stop for a brake pre-hill inspection?

a) Your licence is upgraded
b) You may be fined
c) Tire pressure decreases
d) Fuel economy improves

[Correct Answer]: b)
[Explain]: 若未停车进行 brake pre-hill inspection（坡前刹车检查），驾驶员可能被罚款。
[Reference]: Chapter 10 – Brake Pre-hill Inspection

#C10-16 What may heavy non-commercial vehicle drivers use pullout areas for?

a) Fueling
b) Brake inspections
c) Tire replacement only
d) Parking overnight

[Correct Answer]: b)
[Explain]: 虽然 heavy non-commercial vehicles（大型非商用车辆）不强制停车检查，但仍可使用 pullout areas（检查停车区）检查 brakes（刹车）。
[Reference]: Chapter 10 – Pullout Areas

#C10-17 What should you do if an oil-filled hub is smoking or too hot to touch?

a) Continue driving slowly
b) Add water to the hub
c) Stop driving the vehicle
d) Increase tire pressure

[Correct Answer]: c)
[Explain]: 若 oil-filled hub（油浴轮毂）冒烟或 hub（轮毂）热到无法触碰，不应继续驾驶车辆。
[Reference]: Chapter 10 – Oil-filled Hub Warning

#C10-18 Which commercial trailers are required to have reflective markings?

a) Any trailer longer than 2 m
b) Commercial trailers wider than 2.05 m
c) Trailers with ABS only
d) Recreational trailers only

[Correct Answer]: b)
[Explain]: overall width（总宽度）达到或超过 2.05 m 的 commercial trailers（商用拖车）必须安装 reflective markings（反光标识）。
[Reference]: Chapter 10 – Reflective Markings

#C10-19 What is the purpose of reflective markings on large commercial vehicles?

a) To reduce tire wear
b) To improve vehicle visibility
c) To cool the brake drums
d) To increase fuel efficiency

[Correct Answer]: b)
[Explain]: reflective markings（反光标识）可提高大型 commercial vehicles（商用车辆）的 visibility（可见性）。
[Reference]: Chapter 10 – Vehicle Visibility



`;

let allQuestions = [];
let activePool = [];
let quizQuestions = [];
let currentIdx = 0;
let userAnswers = [];
let wrongBank = JSON.parse(localStorage.getItem('airBrakeWrongBank')) || [];
let timeLeft = 30 * 60;
let timerInterval = null;
let isWrongPracticeMode = false;
const DEFAULT_QUESTION_COUNT = 25;
const DEFAULT_MINUTES = 30;

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function escapeHtml(text) {
  return String(text ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function stripPrefix(text, label) {
  const re = new RegExp(`^${label}\s*(?:解释)?\s*[:：]?\s*`, 'i');
  return text.replace(re, '').trim();
}

function parseData() {
  const normalized = rawData.replace(/\r/g, '').trim();
  const blocks = normalized.split(/(?=^#[A-Z]\d+-\d+\b)/m).filter(block => block.trim());

  allQuestions = blocks.map((block) => {
    const lines = block.split('\n').map(line => line.trim());
    const firstLine = lines[0] || '';
    const codeMatch = firstLine.match(/^#[A-Z]\d+-\d+/i);
    const code = codeMatch ? codeMatch[0] : 'N/A';

    const contentLines = lines.slice(1).filter(line => line.length > 0);
    const questionLines = [];
    const options = [];
    let correctAnswer = '';
    let explain = '';
    let reference = '';

    for (const line of contentLines) {
      if (/^[a-d]\)/i.test(line)) {
        options.push(line);
        continue;
      }
      if (/^\[Correct Answer\]/i.test(line)) {
        const match = line.match(/([a-d])\)/i);
        if (match) correctAnswer = match[1].toLowerCase();
        continue;
      }
      if (/^\[Explain\]/i.test(line)) {
        explain = stripPrefix(line, '\\[Explain\\]');
        continue;
      }
      if (/^\[(?:Page|Reference)\]/i.test(line)) {
        reference = line
          .replace(/^\[Page\]\s*(?:参考手册页码)?\s*[:：]?\s*/i, '')
          .replace(/^\[Reference\]\s*[:：]?\s*/i, '')
          .trim();
        continue;
      }
      questionLines.push(line);
    }

    const questionText = (firstLine.replace(code, '').trim() || questionLines.shift() || '').trim();
    const extraQuestionText = questionLines.join(' ').trim();
    const finalQuestion = [questionText, extraQuestionText].filter(Boolean).join(' ').trim();

    return {
      code,
      q: finalQuestion,
      options,
      ans: correctAnswer,
      explain,
      reference
    };
  }).filter(q => q.code !== 'N/A' && q.q && q.options.length > 0 && q.ans);

  updateBankInfo();
}

function getRequestedQuestionCount() {
  const raw = parseInt(document.getElementById('questionCountInput').value, 10);
  if (!Number.isFinite(raw) || raw < 1) return DEFAULT_QUESTION_COUNT;
  return raw;
}

function buildActivePool() {
  const filterValue = document.getElementById('filterInput').value.trim().toLowerCase();
  if (!filterValue) return [...allQuestions];

  return allQuestions.filter(q => {
    const haystack = [q.code, q.q, q.options.join(' '), q.explain, q.reference].join(' ').toLowerCase();
    return haystack.includes(filterValue);
  });
}

function updateWrongBankCountOnly() {
  const bankInfoEl = document.getElementById('bankInfo');
  const currentText = bankInfoEl.innerText;
  bankInfoEl.innerText = currentText.replace(/Wrong List:\s*\d+/i, `Wrong List: ${wrongBank.length}`);
}

function updateBankInfo() {
  const filtered = buildActivePool();
  const requested = getRequestedQuestionCount();
  const actual = Math.min(requested, filtered.length || requested);
  document.getElementById('bankInfo').innerText =
    `Question Bank: ${filtered.length} available · Current Set: ${actual} · Wrong List: ${wrongBank.length}`;
}

function applySettings() {
  updateBankInfo();
  initQuiz();
}

function clearSettings() {
  document.getElementById('filterInput').value = '';
  document.getElementById('questionCountInput').value = DEFAULT_QUESTION_COUNT;
  updateBankInfo();
  initQuiz();
}

function initQuiz() {
  isWrongPracticeMode = false;
  activePool = buildActivePool();
  if (activePool.length === 0) {
    alert('No questions match the current filter.');
    return;
  }

  const requestedCount = getRequestedQuestionCount();
  const actualCount = Math.min(requestedCount, activePool.length);
  quizQuestions = shuffle(activePool).slice(0, actualCount);
  document.getElementById('timerDisplay').style.display = 'block';
  startSession();
}

function startSession() {
  currentIdx = 0;
  userAnswers = [];
  document.getElementById('quizContainer').style.display = 'block';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('reviewScreen').style.display = 'none';
  document.getElementById('wrongBankScreen').style.display = 'none';
  document.getElementById('controlPanel').style.display = 'flex';

  if (!isWrongPracticeMode) startTimer();
  else clearInterval(timerInterval);

  renderQuestion();
  updateBankInfo();
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = DEFAULT_MINUTES * 60;
  document.getElementById('timerDisplay').innerText = '30:00';
  timerInterval = setInterval(() => {
    timeLeft--;
    const mins = Math.floor(timeLeft / 60);
    const secs = timeLeft % 60;
    document.getElementById('timerDisplay').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      finishQuiz();
    }
  }, 1000);
}

function renderQuestion() {
  const q = quizQuestions[currentIdx];
  document.getElementById('questionCounter').innerText = `Question ${currentIdx + 1} / ${quizQuestions.length}`;
  document.getElementById('qCodeDisplay').innerText = `ID: ${q.code}`;

  const html = `
    <div class="question-text">${escapeHtml(q.q)}</div>
    <ul class="options">
      ${q.options.map(opt => `<li class="option-item" onclick="checkAnswer('${opt.charAt(0).toLowerCase()}', this)">${escapeHtml(opt)}</li>`).join('')}
    </ul>
    <div id="feedbackArea" class="feedback-panel">
      <div id="feedbackTitle" style="font-weight:700; font-size:1.1rem; margin-bottom:8px;"></div>
      <span class="feedback-label">Explanation</span>
      <div class="feedback-content">${escapeHtml(q.explain || '-')}</div>
      <span class="feedback-label">Reference</span>
      <div class="feedback-content">${escapeHtml(q.reference || '-')}</div>
    </div>
  `;
  document.getElementById('questionArea').innerHTML = html;
  document.getElementById('btnSkip').style.display = isWrongPracticeMode ? 'none' : 'inline-block';
  document.getElementById('btnNext').style.display = 'none';
  document.getElementById('btnAddWrong').style.display = 'inline-block';
}

function addCurrentToWrong() {
  const q = quizQuestions[currentIdx];
  if (!q) return;

  if (!wrongBank.some(w => w.code === q.code)) {
    wrongBank.push(q);
    saveBank();
    updateWrongBankCountOnly();
    alert('Added to Wrong List');
  } else {
    alert('Already in Wrong List');
  }
}

function checkAnswer(choice, element) {
  const q = quizQuestions[currentIdx];
  const isCorrect = choice === q.ans;
  const items = document.querySelectorAll('.option-item');

  items.forEach(item => {
    item.classList.add('disabled');
    if (item.innerText.trim().toLowerCase().startsWith(q.ans)) item.classList.add('correct');
  });

  const title = document.getElementById('feedbackTitle');
  if (!isCorrect) {
    element.classList.add('wrong');
    title.innerHTML = `<span style="color:var(--error-text)">✘ Incorrect</span>`;
    if (!isWrongPracticeMode && !wrongBank.some(w => w.code === q.code)) {
      wrongBank.push(q);
      saveBank();
      updateWrongBankCountOnly();
    }
  } else {
    title.innerHTML = `<span style="color:var(--success-text)">✔ Correct</span>`;
  }

  userAnswers.push({ qIndex: currentIdx, choice, isCorrect });
  document.getElementById('feedbackArea').style.display = 'block';
  document.getElementById('btnSkip').style.display = 'none';
  document.getElementById('btnNext').style.display = 'inline-block';
}

function nextQuestion() {
  if (currentIdx < quizQuestions.length - 1) {
    currentIdx++;
    renderQuestion();
  } else {
    if (isWrongPracticeMode) {
      alert('Practice complete.');
      showWrongBank();
    } else {
      finishQuiz();
    }
  }
}

function finishQuiz() {
  clearInterval(timerInterval);
  document.getElementById('quizContainer').style.display = 'none';
  document.getElementById('controlPanel').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';

  const correctCount = userAnswers.filter(a => a.isCorrect).length;
  const totalCount = quizQuestions.length;
  const score = totalCount ? Math.round((correctCount / totalCount) * 100) : 0;

  document.getElementById('scoreStatus').innerText = score >= 80 ? 'PASS' : 'FAIL';
  document.getElementById('scoreStatus').style.color = score >= 80 ? 'var(--success-text)' : 'var(--error-text)';
  document.getElementById('scoreDetail').innerText = `Your score is ${score}%. (${correctCount} out of ${totalCount})`;
}

function showReview() {
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('reviewScreen').style.display = 'block';

  let html = '';
  quizQuestions.forEach((q, idx) => {
    const userAns = userAnswers.find(a => a.qIndex === idx);
    const correctOptionText = q.options.find(opt => opt.toLowerCase().startsWith(q.ans)) || q.ans;

    html += `
      <div class="review-item">
        <div class="review-q-text">${idx + 1}. ${escapeHtml(q.q)} <span style="color: var(--text-sub); font-size: 0.85rem;">(${escapeHtml(q.code)})</span></div>

        <div class="review-ans-row ${userAns?.isCorrect ? 'review-correct' : 'review-wrong'}">
          <strong>Your Answer:</strong> ${escapeHtml(userAns ? userAns.choice : 'Skipped')}
        </div>

        <div class="review-ans-row review-correct">
          <strong>Correct Answer:</strong> [${escapeHtml(q.ans)}] - ${escapeHtml(correctOptionText)}
        </div>

        <span class="review-meta-label">Explanation</span>
        <div class="review-meta-content">${escapeHtml(q.explain || '-')}</div>

        <span class="review-meta-label">Reference</span>
        <div class="review-meta-content">${escapeHtml(q.reference || '-')}</div>
      </div>`;
  });

  document.getElementById('reviewList').innerHTML = html;
}

function showWrongBank() {
  document.getElementById('quizContainer').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('controlPanel').style.display = 'none';
  document.getElementById('reviewScreen').style.display = 'none';
  document.getElementById('wrongBankScreen').style.display = 'block';

  let html = '';
  if (wrongBank.length === 0) {
    html = "<p style='text-align:center; padding:60px; color:var(--text-sub);'>No incorrect questions recorded yet.</p>";
  } else {
    wrongBank.forEach((q, idx) => {
      html += `
        <div class="wrong-card">
          <div style="font-weight:600; margin-bottom:12px;">${idx + 1}. ${escapeHtml(q.q)} <span style="color: var(--text-sub); font-size: 0.85rem;">(${escapeHtml(q.code)})</span></div>
          <div style="font-size:0.85rem; color:var(--success-text); margin-bottom:10px; font-weight:600;">Correct Answer: ${escapeHtml(q.ans)}</div>
          <div style="font-size:0.9rem; padding-top:10px; border-top:1px solid #f1f3f4;">${escapeHtml(q.explain || '-')}</div>
          <div style="font-size:0.85rem; color: var(--text-sub); margin-top: 8px;">${escapeHtml(q.reference || '-')}</div>
          <button onclick="removeFromBank('${escapeHtml(q.code)}')" class="btn-ghost" style="margin-top:16px; padding:6px 14px; font-size:0.8rem;">Remove</button>
        </div>`;
    });
  }

  document.getElementById('wrongBankList').innerHTML = html;
}

function startWrongPractice() {
  if (wrongBank.length === 0) {
    alert('Wrong List is empty.');
    return;
  }
  isWrongPracticeMode = true;
  quizQuestions = [...wrongBank];
  document.getElementById('timerDisplay').style.display = 'none';
  startSession();
}

function skipQuestion() {
  const current = quizQuestions[currentIdx];
  const candidates = activePool.filter(q => q.code !== current.code && !quizQuestions.some(x => x.code === q.code));
  if (candidates.length === 0) {
    alert('No more replacement questions available in the current filtered bank.');
    return;
  }
  const replacement = candidates[Math.floor(Math.random() * candidates.length)];
  quizQuestions.splice(currentIdx, 1, replacement);
  renderQuestion();
}

function removeFromBank(code) {
  wrongBank = wrongBank.filter(w => w.code !== code);
  saveBank();
  updateBankInfo();
  showWrongBank();
}

function saveBank() {
  localStorage.setItem('airBrakeWrongBank', JSON.stringify(wrongBank));
}

function hideWrongBank() {
  document.getElementById('wrongBankScreen').style.display = 'none';
  startSession();
}

function restartSim() {
  if (confirm('Start a new test?')) initQuiz();
}

document.getElementById('filterInput').addEventListener('input', updateBankInfo);
document.getElementById('questionCountInput').addEventListener('input', updateBankInfo);

parseData();
initQuiz();
</script>
