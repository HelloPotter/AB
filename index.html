<script>
const rawData = String.raw`

#R11-01 What is the advantage of a dual circuit air system?

a) To reduce brake lining wear
b) To improve braking effort
c) To prevent total brake failure
d) To operate air accessories
[Correct Answer]: c)
[Explain]: Dual circuit system（双回路系统）的核心作用是提供 redundancy（冗余保护）。如果一个 circuit（回路）失效，另一个 circuit 仍可继续提供部分 braking（制动），从而避免 total brake failure（完全制动失效）。
[Reference]: DCV – Dual Air Systems

#R11-02 The size of the compressor used in an air brake system must be such that it will build air pressure from 50 psi to 90 psi at a fast idle within?

a) One minute
b) Two minutes
c) Three minutes
d) Four minutes
[Correct Answer]: c)
[Explain]: Compressor（空气压缩机）必须具备足够的 pumping capacity（泵气能力），在 fast idle（快速怠速）时，把 reservoir pressure（储气罐压力）从 50 psi 建立到 90 psi，并在规定时间内完成。这是 air supply system（供气系统）性能是否合格的重要标准。
[Reference]: DCV – Air Supply System

#R11-03 What is meant by the term braking distance?

a) The actual distance the air travels through a properly maintained air-brake system
b) The actual distance the vehicle travels from the moment a hazard is recognized to the time the vehicle stops
c) The actual distance the vehicle travels before the driver’s foot moves from the throttle to the brake treadle
d) The actual distance the vehicle travels after the brakes are applied until the vehicle stops
[Correct Answer]: d)
[Explain]: Braking distance（制动距离）是指在 brakes are applied（制动已经施加）之后，到 vehicle stops（车辆完全停止）之间所行驶的距离。它不包括 reaction distance（反应距离）和 brake lag distance（制动迟滞距离）。
[Reference]: DCV – Braking

#R11-04 What is the most common cause of loss of braking effort on air brake equipped vehicles?

a) Primary reservoir air loss
b) Brakes out of adjustment
c) Overheated brake drums
d) Secondary reservoir air loss
[Correct Answer]: b)
[Explain]: Brakes out of adjustment（制动器调整不当）会使 push rod travel（推杆行程）过大，导致 brake chamber（制动气室）输出的有效机械作用减少，最终使 braking effort（制动力）下降。这是 air brake equipped vehicles 中最常见的问题之一。
[Reference]: DCV – Foundation Brakes

#R11-05 On a long steep downgrade, the ideal method of using the brakes is?

a) Snubbing as required
b) Continuous application of 25 psi or less
c) Not using the brakes
d) Continuous application of 10 psi or less
[Correct Answer]: c)
[Explain]: 按这份题库，正确答案是 c)。其逻辑是要尽量依靠正确 gear selection（档位选择）和 engine braking（发动机制动），避免持续依赖 service brakes（行车制动）导致 heat build-up（热量积聚）与 brake fade（制动衰退）。这里我忠于题库答案，不改动。
[Reference]: DCV – Braking on Downgrades

#R11-06 If the brakes do not seem to be holding even though sufficient air pressure is present, you should?

a) Stop, check brakes - continue only after you have determined the brakes are safe
b) Travel at a reduced speed
c) Report the condition at the end of the trip
d) Send a text message to your dispatcher asking for counsel
[Correct Answer]: a)
[Explain]: 如果 reservoir pressure（储气罐压力）看起来正常，但 brakes do not seem to be holding（制动似乎不够有效），说明问题可能出在 adjustment（调整）、foundation brakes（基础制动部件）或其他 mechanical defect（机械故障）上。正确做法是 stop（停车）、check brakes（检查制动），并且只有在确认 safe（安全）后才能继续行驶。
[Reference]: DCV – Trip Inspection / Brake Safety

#R11-07 What must a driver do when a low air warning system activates?

a) Pump the foot treadle to increase braking effort
b) Apply the hand valve
c) Stop the vehicle and determine the cause of air loss
d) Rev the motor with the clutch in
[Correct Answer]: c)
[Explain]: 当 low air warning system（低气压警报系统）启动时，说明 reservoir pressure 已降到危险范围。此时最重要的是 stop the vehicle（把车辆停下）并 determine the cause of air loss（查明漏气或失压原因），因为继续驾驶可能导致 braking capability（制动能力）严重下降。
[Reference]: DCV – Low Air Warning System / Safety Devices

#R11-08 When charging the trailer braking system, if the trailer brakes do not release, this may indicate that:

a) The air lines may be crossed
b) The fifth wheel is not properly attached to the tractor
c) The landing gear may be damaged
d) All of the above
[Correct Answer]: a)
[Explain]: 在给 trailer braking system（挂车制动系统）充气时，如果 trailer brakes do not release（挂车制动没有释放），一个典型原因是 air lines may be crossed（供气线和服务线可能接反）。线路接反会使系统动作异常，导致 trailer brake release（挂车制动释放）失败。
[Reference]: DCV – Tractor-Trailer Air Brake Systems

#R11-09 The main reservoir gauge reads?

a) Wet tank pressure
b) Compressor performance
c) Air pressure in the brake chambers
d) Pressure available for service brake performance
[Correct Answer]: d)
[Explain]: Main reservoir gauge（主储气罐压力表）显示的是可供 service brake performance（行车制动工作）使用的 air pressure（空气压力）。它不是专门显示 brake chambers（制动气室）里的应用压力，而是显示系统中可用的储备压力。
[Reference]: DCV – Gauges / Reservoir Pressure

#R11-10 If the weight of a vehicle is doubled, how many times must the stopping power be increased to stop in the same distance?

a) Two times
b) Six times
c) Eight times
d) Four times
[Correct Answer]: a)
[Explain]: 在相同 speed（速度）下，如果 vehicle weight（车辆重量）加倍，而 stopping distance（停车距离）仍要保持不变，那么 braking force / stopping power（制动力）也必须相应增加到两倍。这属于基础 braking physics（制动物理）概念。
[Reference]: DCV – Braking

#R11-11 How are most modern truck and RV compressors lubricated?

a) From the engine’s lubricating system
b) By an oil supply in the compressor crank case
c) From the transmission lubricating system
d) From the radiator
[Correct Answer]: a)
[Explain]: 多数 modern truck and RV compressors（现代卡车和房车压缩机）由 engine’s lubricating system（发动机润滑系统）供油润滑。这意味着 compressor 的正常工作与 engine lubrication（发动机润滑）状态直接相关。
[Reference]: DCV – Air Supply System / Compressor

#R11-12 What type of air brake endorsement must you have to drive on industrial roads?

a) Off-highway
b) On-highway
c) Industrial
d) a. and c. are correct
[Correct Answer]: d)
[Explain]: 按这份题库，正确答案是 d)，表示在 industrial roads（工业道路）环境下，适用的 air brake endorsement（空气制动许可）包括 off-highway 和 industrial 这两类。这里保持与题库答案一致，不改动。
[Reference]: DCV – Air Brake Endorsements / Industrial Roads

#R11-13 Signs posted in advance of a downgrade, instructing truck drivers to stop and check brakes are?

a) Warning signs
b) Advisory signs
c) Regulatory signs
d) Informative signs
[Correct Answer]: c)
[Explain]: 要求 drivers（驾驶员）必须 stop and check brakes（停车检查制动）的标志属于 regulatory signs（法规性标志），因为它传达的是必须遵守的要求，而不只是 warning（警示）或 advisory（建议）。
[Reference]: DCV – Signs / Downgrade Safety

#R11-14 How often should the reservoirs be drained?

a) Weekly, or more often under extreme conditions
b) Monthly, or more often under extreme conditions
c) Daily, or more often under extreme conditions
d) They do not need to be drained
[Correct Answer]: c)
[Explain]: Reservoirs（储气罐）应 daily（每天）排放，以去除 moisture（水分）和 contamination（污染物）。如果 operating conditions（工作环境）更恶劣，例如高湿、低温或高频使用，则需要 more often（更频繁）排放。
[Reference]: DCV – Reservoir Drainage / Maintenance

#R11-15 What causes moisture to form in the air brake system?

a) Engine coolant leaking into the system
b) Air warms up in the wet tank
c) Air cools in the wet tank
d) Humid weather
[Correct Answer]: c)
[Explain]: 空气被 compressor 压缩后会升温，随后在 wet tank（湿储气罐）或系统中冷却。Air cools（空气冷却）时会形成 condensation（冷凝），这就是 air brake system 中 moisture（水分）的主要来源。
[Reference]: DCV – Moisture in the Air Brake System

#R11-16 If 40 psi is exerted against a diaphragm of 30 square inches in area, what is the total force that would be exerted?

a) 12,000 lbs of force
b) 40 lbs of force
c) 7,200 lbs of force
d) 1,200 lbs of force
[Correct Answer]: d)
[Explain]: 计算公式是 Force = Pressure × Area。这里是 40 psi × 30 square inches = 1,200 lbs of force。这个题考查 diaphragm（膜片）受压后产生 mechanical force（机械力）的基础计算。
[Reference]: DCV – Brake Chamber Force / Braking Principles

#R11-17 Maximum reservoir pressure must be between what two pressures?

a) 105 psi to 135 psi
b) 105 psi to 150 psi
c) 100 psi to 125 psi
d) 50 psi to 90 psi
[Correct Answer]: a)
[Explain]: Maximum reservoir pressure（主储气罐最大压力）必须处于规定 operating range（工作范围）内。题库答案给出 105 psi to 135 psi，这对应正常 governor control（调压器控制）下系统允许的上限范围。
[Reference]: DCV – Governor / Reservoir Pressure

#R11-18 By what minimum pressure should the governor cause the compressor to return to its pumping stage?

a) 80 psi
b) 65 psi
c) 60 psi
d) 105 psi
[Correct Answer]: a)
[Explain]: Governor（调压器）会在系统压力降到 cut-in pressure（切入压力）时，使 compressor return to its pumping stage（压缩机重新开始泵气）。题库答案给出最低值为 80 psi，表示系统不能低于这个最低标准才恢复供气。
[Reference]: DCV – Governor / Cut-in Pressure

#R11-19 If one set of brake shoes are poorly adjusted, what effect could it have on the remaining set of brake shoes in the system?

a) They would increase their share of the braking load, possibly causing overheating
b) The brakes would automatically adjust
c) There would be noticeable affect
d) No noticeable change
[Correct Answer]: a)
[Explain]: 如果一组 brake shoes（制动蹄片）调整不良，无法承担应有的 braking load（制动负荷），那么其余正常工作的 brake shoes 就会承担更多负荷。这样可能导致 overheating（过热）和 uneven braking（制动不均匀）。
[Reference]: DCV – Foundation Brakes / Brake Adjustment

#R11-20 If a trailer is not equipped with spring brakes and the trailer air tank drains, the trailer would likely:

a) Release as the air pressure drops
b) Become dependent on the tractor brakes
c) Be fine
d) b. and c. are correct
[Correct Answer]: b)
[Explain]: 如果 trailer（挂车）没有 spring brakes（弹簧制动），而 trailer air tank（挂车储气罐）又失去压力，那么 trailer 本身就不能依靠 spring brake 自动保持或制动，结果会变得 dependent on the tractor brakes（依赖牵引车制动）。
[Reference]: DCV – Trailer Brake Systems / Spring Brakes

#R11-21 What is the final factor that will determine if a vehicle will move?

a) The amount of traction
b) The amount of friction
c) The amount of power
d) The amount of fuel
[Correct Answer]: a)
[Explain]: Vehicle movement（车辆是否移动）的最终决定因素是 traction（牵引附着力）。即使 engine power（发动机动力）足够，如果轮胎与地面之间缺乏足够 traction，车辆仍可能无法有效起步或移动。
[Reference]: DCV – Braking / Traction

#R11-22 To stop a vehicle, the energy of motion is turned into?

a) Heat in the spring brakes
b) Heat in the brake lining and drums
c) Moisture in the reservoirs
d) Rubber left on the road
[Correct Answer]: b)
[Explain]: 当车辆减速和停车时，motion energy（运动能量）会通过 friction（摩擦）转化为 heat（热），主要出现在 brake lining and drums（制动衬片和制动鼓）中。这是制动工作的基本原理。
[Reference]: DCV – Braking / Heat

#R11-23 If a small leak develops in a brake chamber, what type of valve will continue to hold the same application pressure in the brake chamber?

a) Poppet
b) Graduating
c) Relay
d) Self balancing
[Correct Answer]: d)
[Explain]: Self balancing valve（自平衡阀）能够在系统存在轻微泄漏时，继续维持 brake chamber（制动气室）内的 application pressure（应用压力）相对稳定，因此不会因为小 leak（泄漏）立刻失去作用。
[Reference]: DCV – Valves / Foot Valve Operation

#R11-24 What is the main cause of brake fade at high temperatures?

a) The air pressure becomes hot
b) The brake linings expand away from the drums
c) The brake drums expand away from the linings
d) The slack adjusters seize from the heat
[Correct Answer]: c)
[Explain]: Brake fade（制动衰退）在高温下常见原因之一，是 brake drums（制动鼓）受热膨胀，expand away from the linings（与衬片之间的有效接触减弱），从而降低 braking efficiency（制动效率）。
[Reference]: DCV – Brake Fade / Heat

#R11-25 When air pressure in the reservoir is at maximum, the compressor is?

a) Uncoupled
b) Stopped
c) Governor reloaded
d) Governor unloaded
[Correct Answer]: d)
[Explain]: 当 reservoir pressure（储气罐压力）达到 maximum（最大值）时，governor 会使 compressor 进入 unloaded（卸载）状态，也就是不再继续压缩供气，但压缩机本身并不是完全 stopped。
[Reference]: DCV – Governor / Compressor Unloading

#R11-26 To receive an ICBC approved air brake endorsement you must:

a) Complete an ICBC approved air brake course
b) Pass the air brake knowledge test
c) Pass an air brake pre-trip inspection test
d) All of the above
[Correct Answer]: d)
[Explain]: 取得 ICBC approved air brake endorsement（ICBC认可的空气制动许可）需要完成 course（课程）、通过 knowledge test（笔试）以及通过 pre-trip inspection test（气刹预检测试）。题目考查的是完整资格要求。
[Reference]: DCV – Air Brake Endorsement Requirements

#R11-27 How is the heat dissipated that is generated by the brakes?

a) Dissipated by the speed of the vehicle
b) Dissipated by the air temperature
c) Dissipated by the slack adjusters
d) Dissipated by the drums
[Correct Answer]: d)
[Explain]: 制动时产生的 heat（热量）主要由 drums（制动鼓）吸收，然后 dissipated（散发）到 surrounding air（周围空气）中。也就是说，drums 是主要的散热部件。
[Reference]: DCV – Braking / Heat Dissipation

#R11-28 When building air pressure during an air brake pre-trip inspection, at what p.s.i. should the low air warning device deactivate?

a) 80 p.s.i. or higher
b) 50 p.s.i. or higher
c) 60 p.s.i. or higher
d) 70 p.s.i. or higher
[Correct Answer]: c)
[Explain]: 在 pre-trip inspection（出车前检查）中，随着 system pressure（系统压力）重新建立，low air warning device（低气压警报装置）应在 60 psi or higher 时解除。这个数值用于确认 warning device 的工作范围是否正常。
[Reference]: DCV – Low Air Warning Device / Pre-trip Inspection

#R11-29 The final decision as to the condition of the brakes should be made by?

a) The owner
b) The mechanic
c) The driver
d) The police
[Correct Answer]: c)
[Explain]: 车辆是否 safe to operate（适合上路）这一最终判断责任，在运行前属于 the driver（驾驶员）。即使 owner 或 mechanic 提供意见，driver 仍要对 vehicle condition（车辆状态）作最终决定。
[Reference]: DCV – Driver Responsibility / Brake Safety

#R11-30 If the compressor discharge line is broken, what prevents total air loss?

a) The governor
b) The two-way check valve
c) The relay valve
d) The one-way check valve
[Correct Answer]: d)
[Explain]: 如果 compressor discharge line（压缩机排气管）断裂，one-way check valve（单向止回阀）会阻止储气罐中的空气反向流失，从而 prevents total air loss（防止全部空气损失）。
[Reference]: DCV – One-way Check Valve / Air Supply System

#R12-01 The only way to be sure your brakes are adjusted properly is?

a) By physically checking the push rod travel at each wheel
b) By checking the pressure gauges
c) By feeling the response on a light air application
d) By driving ahead and doing a full brake application
[Correct Answer]: a)
[Explain]: 正确判断 brakes are adjusted properly（制动是否调整正确），必须通过 physically checking（实际检查）每个 wheel 上的 push rod travel（推杆行程），以确认是否在允许行程范围内。
[Reference]: DCV – Foundation Brakes / Adjustment

#R12-02 A good way to test the holding power of a spring brake is to?

a) Tug test in low gear, spring brakes applied
b) Allow the spring brake to hold the vehicle on a grade
c) Applying the spring brake with the vehicle in motion
d) Spring brakes do not need to be able to stop the vehicle
[Correct Answer]: a)
[Explain]: 验证 spring brakes（弹簧制动）的 holding power（保持能力），标准做法是 tug test（轻拉测试）：挂低档、轻给动力，检查车辆是否仍被 spring brakes 保持不动。
[Reference]: DCV – Pre-trip Inspection / Spring Brakes

#R12-03 The speed at which a vehicle should travel on a downgrade is best determined by?

a) The necessity to make an emergency stop
b) The condition of the road
c) The length and percentage of the grade
d) The condition of the brake lining
[Correct Answer]: a)
[Explain]: 选择 downgrade（下坡）车速时，根本标准是车辆在该速度下是否仍能完成 emergency stop（紧急停车），这是 DCV 判断 safe speed（安全车速）的核心。
[Reference]: DCV – Braking on Downgrades

#R12-04 The final factor which will determine if a vehicle will stop is?

a) Traction
b) Brake adjustment
c) Primary reservoir air pressure
d) Friction
[Correct Answer]: d)
[Explain]: 真正把车辆动能转为热能、使车辆停下来的，是接触表面之间的 friction（摩擦力）；气压和调整只是把制动力传递到摩擦面。
[Reference]: DCV – Braking / Friction

#R12-05 Water in the reservoir is harmful to the air system because?

a) It carries dirt into the valves
b) It cuts down on reservoir volume
c) It freezes in cold weather
d) All of the above
[Correct Answer]: d)
[Explain]: Reservoir（储气罐）中的 water（水）会带入 dirt（污物）、占用有效储气容积，并在 cold weather（寒冷天气）结冰堵塞气路，因此 a、b、c 都成立。
[Reference]: DCV – Moisture

#R12-06 An automatic front wheel limiting valve is over-ridden when application pressure exceeds?

a) 20 psi
b) 40 psi
c) 60 psi
d) 90 psi
[Correct Answer]: c)
[Explain]: Automatic front wheel limiting valve（自动前轮限压阀）只在较轻制动时限制前轮压力；当 application pressure（施加压力）超过 60 psi，系统恢复完整制动力。
[Reference]: DCV – Brake Balance

#R12-07 During an air brake pre-trip inspection on a vehicle with one trailer, you should make sure that air loss is not more than:

a) 1 p.s.i. within one minute
b) 2 p.s.i. within one minute
c) 3 p.s.i. within one minute
d) 4 p.s.i. within one minute
[Correct Answer]: d)
[Explain]: DCV 在 air leak test（漏气测试）中把单车与组合车辆分开规定；带 one trailer（一辆挂车）的组合车辆允许上限是 4 psi/min。
[Reference]: DCV – Pre-trip Inspection / Air Leak Test

#R12-08 Spring brakes are most useful as?

a) A reserve brake if the service brakes fail
b) A parking brake
c) An emergency stopping device
d) Service brakes
[Correct Answer]: b)
[Explain]: Spring brakes（弹簧制动）的主要用途是 parking brake（驻车制动），也就是在车辆停放时 mechanically hold（机械保持）车辆不动。
[Reference]: DCV – Spring Brakes

#R12-09 What is the purpose of a relay valve?

a) To reduce application pressure to the steering axle
b) To relay reservoir air directly to the treadle valve
c) To release the spring brakes faster
d) To provide quicker application, thus reducing brake lag
[Correct Answer]: d)
[Explain]: Relay valve（继动阀）利用 nearby reservoir（附近储气罐）的空气更快施加制动，以减少 brake lag（制动迟滞）。
[Reference]: DCV – Relay Valve

#R12-10 To operate a vehicle equipped with air brakes on a highway, you must have:

a) Completed an air brake course and an air brake pre-trip inspection test
b) An industrial air brake endorsement
c) An air brake endorsement from ICBC.
d) A and C are correct
[Correct Answer]: d)
[Explain]: On-highway（公路）驾驶 air brake vehicle（气刹车辆）需要完成相关 training / test（训练与测试），并取得 ICBC 的 air brake endorsement（气刹许可）。
[Reference]: DCV – Licensing

#R12-11 The stopping distance of a vehicle is most affected by?

a) The speed of the vehicle
b) The condition of the brakes
c) The condition of the tires
d) The condition of the highway
[Correct Answer]: a)
[Explain]: Speed（速度）对 stopping distance（停车距离）影响最大；速度越高，车辆需要消耗的动能越大，停车距离增加最明显。
[Reference]: DCV – Braking

#R12-12 The spring brake emergency release system will allow a driver to?

a) Move a disabled vehicle to safety
b) Slowly drive a disabled vehicle to a stop
c) Operate in California
d) Cage the spring brakes
[Correct Answer]: a)
[Explain]: Spring brake emergency release system（弹簧刹车紧急释放系统）的用途，是在失压或故障时释放 spring brakes，使 disabled vehicle（故障车辆）能被移到安全位置。
[Reference]: DCV – Spring Brakes

#R12-13 While doing an air leak test in a tractor and semi-trailer with maximum air pressure, air loss should not exceed?

a) 3 psi
b) 4 psi
c) 6 psi
d) 2 psi
[Correct Answer]: b)
[Explain]: Tractor and semi-trailer（牵引车加半挂车）属于组合车辆，DCV 对这类 air leak test 的允许上限是 4 psi/min。
[Reference]: DCV – Air Leak Test

#R12-14 What is the most common cause of loss of effective braking on air equipped vehicles?

a) Overheated brake drums
b) Low air pressure
c) Slippery roads
d) Brakes out of adjustment
[Correct Answer]: d)
[Explain]: DCV 指出，最常见的 loss of effective braking（有效制动下降）原因是 brakes out of adjustment（制动失调），会造成 push rod 行程过大、制动力下降。
[Reference]: DCV – Foundation Brakes

#R12-15 A quick release valve is sometimes used with spring brakes to?

a) Allow faster application
b) Allow faster release
c) Allow more powerful parking brake
d) Allow for more easily checking slack adjustor travel
[Correct Answer]: a)
[Explain]: 按题库答案，这道题考的是 quick release valve（快放阀）在某些 spring brake circuits（弹簧制动回路）中的特定布置，可使相关制动动作建立更快。
[Reference]: DCV – Valves

#R12-16 What is the purpose of a quick release valve?

a) To prevent brake lag time
b) To allow service brakes to release quickly
c) To allow air to escape through the foot treadle
d) To reduce brake lag time
[Correct Answer]: b)
[Explain]: Quick release valve（快放阀）的作用是让 service brakes（行车制动）在松开后更快 release（释放），通过就近排气减少回流路径。
[Reference]: DCV – Valves

#R12-17 Water cooled brakes are used:

a) To control brake drum overheating (prevent brake fade).
b) To help extremely large vehicles stop safely.
c) To avoid any cracks in the brake drum.
d) All of the above.
[Correct Answer]: d)
[Explain]: Water cooled brakes（水冷制动）用于极重型工况，可控制 overheating（过热）、帮助大型车辆安全制动，并减少高热造成的部件损伤，因此 a、b、c 都成立。
[Reference]: DCV – Brake Systems

#R12-18 Compounding of the brakes will result in some vehicles when?

a) A full brake application is made when the spring brakes are released
b) A full brake application is made when the hand valve is on
c) A full brake application is made when the spring brakes are applied
d) A full brake application is made when the wheels are not blocked
[Correct Answer]: c)
[Explain]: Compounding（复合制动）是 service brake force（行车制动力）和 spring brake force（弹簧制动力）同时作用在同一制动机构上，因此发生在 spring brakes 已施加时再做 full brake application。
[Reference]: DCV – Compounding

#R12-19 Drivers are required to have an industrial air brake endorsement if:

a) They will be transporting natural resources on industrial roads.
b) They will be driving loaders or graders on industrial roads.
c) They are operating unlicensed, air brake equipped vehicles that are loaded with natural resources on industrial roads.
d) All of the above.
[Correct Answer]: c)
[Explain]: 这题考的是 Industrial Air Brake Endorsement 的特定适用条件：操作 unlicensed（未注册）、air brake equipped（带气刹）、并装载 natural resources（自然资源）的车辆在 industrial roads（工业道路）上运行。
[Reference]: DCV – Industrial Endorsement

#R12-20 What is the maximum pressure available for a full brake application at any given time?

a) Depends on the distance the foot treadle is depressed
b) 135 psi
c) 105 psi
d) Reservoir pressure
[Correct Answer]: d)
[Explain]: Full brake application（完全制动施加）在任何时刻可用的最大压力，取决于 reservoirs（储气罐）中实际储存的压力，而不是固定数值。
[Reference]: DCV – Air Supply

#R12-21 By what pressure should the low pressure warning device activate?

a) Above 40 psi
b) Above 90 psi
c) Above 60 psi
d) Before 20 psi
[Correct Answer]: c)
[Explain]: Low pressure warning device（低压警报装置）必须在系统跌入极危险区之前发出警报；DCV 的触发点约为 60 psi。
[Reference]: DCV – Warning Devices

#R12-22 How can spring brakes be released without the use of air pressure?

a) Disconnect the slack adjustor and push-rods
b) Caging the springs
c) Backing off the slack adjuster all the way
d) Undoing the bolt that holds the spring in place
[Correct Answer]: b)
[Explain]: 没有 air pressure（气压）时，释放 spring brakes（弹簧刹车）的标准机械方法是 caging the springs（机械锁定/压缩弹簧）。
[Reference]: DCV – Spring Brakes

#R12-23 Belt driven air compressors should have the belts checked for cracks and tension?

a) Weekly
b) Monthly
c) Daily
d) Periodically
[Correct Answer]: c)
[Explain]: Belt driven compressor（皮带驱动压缩机）的皮带状态直接影响建压能力，因此 DCV 把 cracks and tension（裂纹与张力）列入 daily inspection（日常检查）。
[Reference]: DCV – Maintenance

#R12-24 Unless a spring brake system has an anti-compounding device, the spring brakes should be released before making a full brake application test because?

a) The compounding force may damage the slack adjuster and other brake components
b) The brakes will apply too quickly
c) You will not get a true air loss reading
d) The brakes will release too quickly
[Correct Answer]: a)
[Explain]: 如果 spring brakes 已施加，再做 full service brake application，就会形成 compounding force（复合力），可能损坏 slack adjuster（间隙调节臂）和其他制动部件。
[Reference]: DCV – Compounding

#R12-25 Braking systems that have automatic slack adjusters?

a) Must be checked daily for travel
b) Do not need to be checked for travel
c) Must be checked occasionally for travel
d) Must be checked by a mechanic for travel
[Correct Answer]: a)
[Explain]: Automatic slack adjusters（自动间隙调节器）并不表示永远不会失调；DCV 要求仍需 daily check（每日检查）push rod travel（推杆行程）是否超限。
[Reference]: DCV – Slack Adjusters

#R12-26 If you perform a brake test and find that the brakes are not operating safely, what should you do?

a) Drive your vehicle back to your carrier for repair.
b) Finish your trip, and then have the vehicle repaired.
c) Stop the vehicle in a safe place and secure it, do not drive it until the brakes are repaired.
d) Call for 24 hour roadside assistance.
[Correct Answer]: c)
[Explain]: DCV 的要求是：一旦 brakes are not operating safely（制动不安全），必须把车辆停在安全地点并 secure（固定），在 repairs（修复）完成前不得继续驾驶。
[Reference]: DCV – Safety

#R12-27 What is meant by the term friction?

a) The factor that stops the vehicle
b) The factor that moves the vehicle
c) The force that resists movement between two surfaces in contact
d) The force the push rod applies to the diaphragm
[Correct Answer]: c)
[Explain]: Friction（摩擦）在 DCV/物理定义中，是 two surfaces in contact（接触表面）之间 resisting movement（阻碍相对运动）的力。
[Reference]: DCV – Physics

#R12-28 When checking slack adjuster push rod travel with a pry bar, travel must not exceed?

a) One and a half inches
b) Two inches
c) One half inch
d) Three quarters of an inch
[Correct Answer]: d)
[Explain]: 这题考的是 pry bar（撬杆）检查法的允许上限；DCV 给该检查法的标准限制是 3/4 inch。
[Reference]: DCV – Adjustment

#R12-29 When should a driver use the manual front wheel limiting valve?

a) When necessary on slippery roads to cut out front wheel brakes
b) When necessary on slippery roads to cut front brake application by 25%
c) When necessary on slippery roads to cut front brake application by 75%
d) When necessary on slippery roads to cut front brake application by 50%
[Correct Answer]: d)
[Explain]: Manual front wheel limiting valve（手动前轮限压阀）在 slippery roads（湿滑路面）上使用时，是把 front brake application（前轮制动施加）减少 50%，以降低前轮抱死风险。
[Reference]: DCV – Brake Balance

#R12-30 If the speed and weight of a vehicle is doubled, how many times must the braking force be increased to stop in the same distance?

a) Two times
b) Four times
c) Six times
d) Eight times
[Correct Answer]: d)
[Explain]: Weight（重量）加倍会使所需制动力加倍；speed（速度）加倍会使动能增到 4 倍。两者同时发生时，braking force（制动力）需要增加到 8 倍。
[Reference]: DCV – Braking Physics

#R13-01 When the supply line is broken, tractor pressure should not drain below?

a) 50 psi to 90 psi
b) 105 psi to 135 psi
c) 20 psi to 45 psi
d) 105 psi to 150 psi
[Correct Answer]: c)
[Explain]: Supply line（供气线）断裂时，tractor protection system（牵引车保护系统）必须在压力掉到危险值前切断挂车侧；DCV 给出的保护动作范围是 20–45 psi。
[Reference]: DCV – Tractor Protection System

#R13-02 What are the main components of a simple air brake system?

a) Air lines, reservoir, brake pedal, foundation brakes, spring-line.
b) Compressor, air lines, brake pedal.
c) Compressor, air lines, reservoir, brake pedal, foundation brakes.
d) Air lines, reservoir, foundation brakes, spring-line.
[Correct Answer]: c)
[Explain]: Simple air brake system（基础气刹系统）必须具备建压、输送、储气、控制和最终制动五类部件，只有 c) 同时包含这些核心组成。
[Reference]: DCV – Air Brake System Components

#R13-03 Why is it so critical to check slack adjustments?

a) To ensure the vehicle can stop safely.
b) To ensure the foot valve is in the correct position.
c) To measure the push rod travel.
d) To pass inspection.
[Correct Answer]: a)
[Explain]: Slack adjustment（间隙调整）直接影响制动力传递；一旦调整不当，车辆可能无法 safely stop（安全停车），这就是 DCV 强调其关键性的原因。
[Reference]: DCV – Foundation Brakes

#R13-04 How can you tell if you have reversed the supply line and service line connections in your spring parking brakes?

a) The spring parking brakes will not release even when you use the parking brake control on the dashboard.
b) The trailer service brakes will not function.
c) The parking brake control on the dashboard will short out.
d) a and b
[Correct Answer]: d)
[Explain]: Supply line 和 service line 接反后，spring parking brakes（弹簧驻车制动）可能无法释放，trailer service brakes（挂车行车制动）也可能无法正常工作，因此 a 和 b 都成立。
[Reference]: DCV – Tractor-Trailer Connections

#R13-05 Why should you avoid compounding the air brakes?

a) You can cause damage to the slack adjusters and s-cams.
b) You can cause damage to the brake chamber mounting bolts, brake shoe rollers, shoes and brake drums.
c) You will risk damage by putting too much force on the brake components.
d) All of the above
[Correct Answer]: d)
[Explain]: Compounding（复合制动）会把 service brake 和 spring brake 的力量叠加到同一套制动件上，因此 a、b、c 所说的损坏风险都会发生。
[Reference]: DCV – Compounding

#R13-06 What valve supplies air to the trailer reservoir?

a) The trailer supply valve
b) The hand valve
c) The highway valve
d) The two-way check valve
[Correct Answer]: a)
[Explain]: Trailer reservoir（挂车储气罐）的持续供气由 trailer supply valve（挂车供气阀）负责；hand valve 是测试控制阀，不承担储气罐供气功能。
[Reference]: DCV – Trailer Supply System

#R13-07 What must you do if the low pressure warning indicator activates?

a) Stop immediately and call your supervisor for assistance.
b) Continue on to the next stop and then investigate.
c) Wait until the wig-wag retracts then stop.
d) Stop and find the cause of the air loss.
[Correct Answer]: d)
[Explain]: Low pressure warning（低压警报）表示系统已接近不安全区；DCV 要求先安全停车，再查明 air loss（失压/漏气）原因。
[Reference]: DCV – Warning Systems

#R13-08 If a trailer that DOES NOT have spring brakes breaks away from a tractor, the trailer brakes must hold in a full emergency application for a minimum of?

a) 10 minutes
b) 20 minutes
c) 15 minutes
d) 5 minutes
[Correct Answer]: c)
[Explain]: 没有 spring brakes 的挂车不能靠机械力长期保持制动，因此 breakaway（脱挂）后的 emergency application 必须至少维持 15 minutes。
[Reference]: DCV – Trailer Brake Safety

#R13-09 In most trailers the reservoir is filled with air through the?

a) Treadle valve
b) Service line
c) Primary reservoir
d) Relay emergency valve
[Correct Answer]: d)
[Explain]: 多数 trailers（挂车）的 reservoir（储气罐）充气与紧急控制逻辑，都通过 relay emergency valve（继动紧急阀）管理。
[Reference]: DCV – Trailer System

#R13-10 What prevents total loss of air pressure in the service brake system in the event of an air line rupture between the compressor and the supply reservoir?

a) Reservoir pressure gauge
b) One-way check valves
c) Secondary reservoir
d) Foot valve
[Correct Answer]: b)
[Explain]: One-way check valves（单向止回阀）能阻止空气在故障时反向流失，因此在供气线破裂时防止 total air loss（完全失压）。
[Reference]: DCV – Check Valves

#R13-11 When the trailer without spring brakes is disconnected and left parked, the driver should?

a) Make sure the trailer brakes are applied
b) Block the wheels
c) Make sure the brakes are adjusted
d) Check wheels for excessive heat
[Correct Answer]: b)
[Explain]: 没有 spring brakes 的 trailer 不能长期靠空气保持驻车；随着 reservoir pressure 逐渐流失，制动会失效，因此必须用 wheel chocks（挡轮器）物理挡轮。
[Reference]: DCV – Parking Safety

#R13-12 Why are air brakes, rather than hydraulic brakes, used on heavy commercial vehicles?

a) Use greater force to apply brakes, more tolerant to small leaks and they have proven they stop heavy vehicles safely.
b) They are cheaper and more effective.
c) Use a greater force and are quieter in residential areas.
d) They have proven they are capable of stopping heavy vehicles and have a faster brake lag time.
[Correct Answer]: a)
[Explain]: DCV 强调 air brakes（气刹）适合 heavy commercial vehicles（重型商用车辆），因为能提供更大 braking force（制动力），并对 small leaks（小漏气）更有容忍度。
[Reference]: DCV – Air vs Hydraulic

#R13-13 The valve that causes the trailer brakes to apply immediately if the trailer breaks away is called?

a) The two way check valve
b) The automatic front wheel limiting valve
c) The tractor protection valve
d) The relay emergency valve
[Correct Answer]: d)
[Explain]: Trailer breaks away（挂车脱离）时，真正使挂车进入紧急制动的是 relay emergency valve（继动紧急阀）；tractor protection valve 主要负责保护牵引车不失压。
[Reference]: DCV – Emergency Valves

#R13-14 When a trailer without spring brakes is left parked, the wheels must be blocked because?

a) The trailer reservoir pressure might bleed off, causing trailer to run away
b) Someone may pull the trailer without charging the system
c) The tractor protection valve may leak air
d) The trailer supply valve may malfunction
[Correct Answer]: a)
[Explain]: 没有 spring brakes 的 trailer 一旦 reservoir pressure 逐渐 bleed off（泄掉），空气保持制动会消失，挂车就可能 run away（自行滑动）。
[Reference]: DCV – Parking Safety

#R13-15 If you make a full brake application during an emergency stop with an automatic front wheel limiting system, how much air pressure is directed to the front brakes?

a) 60 psi
b) 70 psi
c) 40 psi
d) Equal pressure to steering axle and drive axle brakes.
[Correct Answer]: d)
[Explain]: 在 full brake application（完全制动施加）时，automatic front wheel limiting system 会被 override（覆盖），前轴与驱动轴得到 equal pressure（相等压力）。
[Reference]: DCV – Brake Balance

#R13-16 Brake adjustment is best checked by?

a) Looking for a drop in reservoir pressure of more than 12 psi
b) Pulling the slack adjuster with a pry bar
c) Rolling ahead and making a full brake application
d) Driving up to speed and doing a full brake application
[Correct Answer]: b)
[Explain]: Brake adjustment（制动调整）最可靠的检查方式，是用 pry bar（撬杆）实际检查 slack adjuster / push rod travel（推杆行程），而不是靠路试感觉或压力变化。
[Reference]: DCV – Adjustment

#R13-17 What is the fine for operating a commercial vehicle with brakes improperly adjusted?

a) $30
b) $100
c) Up to $2,000
d) $150
[Correct Answer]: c)
[Explain]: DCV / 法规把 improperly adjusted brakes（制动调整不当）视为严重安全违法行为，因此罚款可高达 $2,000。
[Reference]: DCV – Regulations

#R13-18 How can you tell how much air pressure is in the main reservoir?

a) By consulting the one-way check valve.
b) By consulting the reservoir pressure gauges mounted in the dashboard.
c) Manually checking the reservoir using a pressure gauge.
d) a and c
[Correct Answer]: b)
[Explain]: 正常驾驶中读取 main reservoir pressure（主储气压力）的标准方法，是看仪表板上的 reservoir pressure gauges（储气压力表）。
[Reference]: DCV – Gauges

#R13-19 A trailer hand valve should only be used to?

a) Descend a steep downgrade
b) Stop at traffic lights
c) To test trailer service brakes
d) Prevent the trailer from skidding
[Correct Answer]: c)
[Explain]: Trailer hand valve 的标准用途是 test trailer service brakes（测试挂车行车制动），不是正常行车中的控制阀。
[Reference]: DCV – Hand Valve

#R13-20 Who is ultimately responsible for the brakes on a vehicle?

a) The maintenance crew.
b) The driver.
c) The owner.
d) The owner and mechanical team.
[Correct Answer]: b)
[Explain]: 虽然车主和维修人员都参与维护，但 DCV 把车辆上路前的最终安全责任放在 driver（驾驶员）身上。
[Reference]: DCV – Driver Responsibility

#R13-21 What is one advantage of a dual air brake system?

a) In the event of a total failure of one system, the driver is still able to stop the vehicle.
b) Only one reservoir needs to be maintained.
c) Shorter stopping distances and brake lag time.
d) The driver does not need to stop in the event of low air warning.
[Correct Answer]: a)
[Explain]: Dual air brake system（双回路气刹系统）的主要优势是 redundancy（冗余保护）；一套回路失效时，另一套仍可能保留部分制动能力。
[Reference]: DCV – Dual System

#R13-22 How are the spring brakes affected when brakes are out of adjustment?

a) They are unaffected
b) More powerful for parking
c) Spring will drag
d) Less powerful for parking
[Correct Answer]: d)
[Explain]: Brakes out of adjustment（制动失调）会让制动机构需要更大行程才能起作用，因此 spring brakes 的有效 parking force（驻车保持力）也会下降。
[Reference]: DCV – Adjustment

#R13-23 The most common cause of air loss in a tractor-trailer system is?

a) A leaking tractor protection valve
b) Defective glad hand seals
c) A leaking two-way check valve
d) Faulty governor
[Correct Answer]: b)
[Explain]: Tractor-trailer system（牵引车挂车系统）最常见的漏气点在 glad hands（气管接头）处，因为 seals（密封圈）容易磨损、进脏物或密封不良。
[Reference]: DCV – Connections

#R13-24 If there was a slight air leak coming from the glad hands the driver might be able to correct this condition by?

a) Reducing the pressure to the trailer system
b) Taking the glad hands apart and checking the seals for dirt, tears or grit
c) Wrapping the glad hands with duct tape
d) Switching the position of the service and supply lines
[Correct Answer]: b)
[Explain]: Slight air leak（轻微漏气）常见原因是 glad hand seals 上有 dirt（污物）、grit（砂粒）或 tears（破损），因此正确处理是拆开检查密封圈状态。
[Reference]: DCV – Maintenance

#R13-25 Where would an air dryer be installed in an air brake system?

a) In the compressor discharge line between the compressor and the first reservoir.
b) Between the governor and the compressor.
c) Immediately before the foot valve.
d) On the instrument panel next to the reservoir pressure gauges.
[Correct Answer]: a)
[Explain]: Air dryer（空气干燥器）的作用是尽早去除压缩空气中的 moisture（湿气）和 contaminants（污染物），所以必须装在 compressor 出气后、进入第一个 reservoir 之前。
[Reference]: DCV – Air Dryer

#R13-26 How much pressure should you apply to the foot valve when measuring slack adjustment using the applied stroke method?

a) 40 psi
b) 150 psi
c) 300 psi
d) 90 to 100 psi
[Correct Answer]: d)
[Explain]: Applied stroke method（施压行程法）要求在标准 brake application pressure（制动施加压力）下测量 push rod 行程；DCV 给出的标准范围是 90–100 psi。
[Reference]: DCV – Adjustment

#R13-27 Air lines should be attached to the trailer without spring brakes prior to backing under, then?

a) Charge trailer then apply trailer parking brakes
b) Release all spring brakes hand valve full on
c) Release spring brakes back under trailer
d) Release spring brakes full foot valve application
[Correct Answer]: a)
[Explain]: 对没有 spring brakes 的 trailer，接好 air lines 后应先 charge trailer（给挂车充气），再确保挂车处于安全制动状态，以防 backing under（倒车接挂）过程中挂车无制动保护。
[Reference]: DCV – Coupling

#R13-28 If the service line to the trailer ruptures or develops a leak while the vehicle is in service, the trailer brakes will apply immediately?

a) When the driver applies the brakes by his hand or foot valve
b) Immediately
c) When the pressure in the system drops to between 20 psi and 45 psi
d) When the pressure in the system drops to between 80 psi and 60 psi
[Correct Answer]: c)
[Explain]: Trailer emergency application（挂车紧急制动）不是在 service line 一漏就无条件发生，而是在系统压力跌入 emergency trigger range（紧急触发区间）后触发；题库给出的区间是 20–45 psi。
[Reference]: DCV – Emergency System

#R13-29 A pressure protection valve is used to?

a) Cut down braking forces under slippery conditions
b) Protect the reservoir from over-pressurization
c) Prevent the trailer brakes from dynamiting
d) Prevent failure of air accessories from totally depleting reservoirs
[Correct Answer]: d)
[Explain]: Pressure protection valve（压力保护阀）的作用，是优先保护制动系统储气，不让 air accessories（气动附件）把 reservoirs（储气罐）里的气全部耗光。
[Reference]: DCV – Protection Valve

#R13-30 If you are adjusting an automatic slack adjuster that has hexagonal head adjusting bolt, you must rotate the adjusting bolt in which direction?

a) Clockwise.
b) Counter-clockwise.
c) Up.
d) Down.
[Correct Answer]: a)
[Explain]: 这题考的是 specific adjustment direction（特定调整方向）；按题库/手册对应的这类 hexagonal head adjusting bolt，调整方向是 clockwise（顺时针）。
[Reference]: DCV – Adjustment

#R14-01 What is an advantage of automatic slack adjusters?

a) They automatically adjust themselves during full brake applications provided they are working correctly.
b) They automatically clean out the moisture and oil from the reservoir.
c) They require manual adjustment less frequently.
d) They don't need to be checked by a qualified mechanic.
[Correct Answer]: a)
[Explain]: Automatic slack adjusters（自动间隙调节器）的设计目的，是在正常工作时通过 full brake applications（完全制动施加）自动补偿 brake lining wear（制动衬片磨损）带来的间隙变化，从而帮助保持 proper adjustment（正确调整状态）。它们并不是“完全不用检查”的装置，也不会清除 reservoir（储气罐）中的 moisture（湿气）或 oil（油污）。题目问的是“advantage（优点）”，最准确的就是它能在 working correctly（工作正常）时自动完成调整。
[Reference]: DCV – Foundation Brakes / Slack Adjusters

#R14-02 A leak at the hand valve exhaust port when the foot valve is applied would most likely be caused by?

a) A defective hand valve
b) A ruptured diaphragm in the tractor protection valve
c) A defective two-way check valve
d) A defective one-way check valve
[Correct Answer]: c)
[Explain]: 在 tractor-trailer air system（牵引车—挂车空气系统）里，hand valve（手控阀）和 foot valve（脚阀）都可能向 trailer service circuit（挂车行车制动回路）提供控制信号。Two-way check valve（双向止回阀）的作用，是在两个输入之间自动选择较高压力的一路，同时防止一路空气回流到另一路。如果 foot valve 应用时，空气反而从 hand valve exhaust port（手控阀排气口）泄出，最典型原因就是 two-way check valve 失效，导致本应被隔离的压力串回 hand valve 一侧并从排气口漏出。
[Reference]: DCV – Valves / Trailer Control Valves

#R14-03 What would be the most likely cause of a safety valve "blowing off"?

a) Governor out of adjustment
b) Exhaust or inlet valves stuck open
c) Defective governor
d) Defective inlet valve
[Correct Answer]: c)
[Explain]: Safety valve（安全阀）的作用，是在 system pressure（系统压力）异常升高时自动释放空气，防止 over-pressurization（过压）。正常情况下，governor（调压器）会控制 compressor（压缩机）的 cut-out（停止泵气点）和 cut-in（恢复泵气点）。如果 governor defective（调压器失效），compressor 可能持续建立过高压力，最终触发 safety valve “blowing off”（安全阀放气）。因此，最可能的根本原因是 governor 本身故障，而不是单纯的正常调节偏差。
[Reference]: DCV – Air Supply System / Governor / Safety Valve

#R14-04 Tractor protection systems must shut off air supply to the trailer when?

a) The service line ruptures
b) The driver pulls the parking control valve
c) The supply line ruptures
d) Main reservoir pressure drops to between 20 psi and 45 psi
[Correct Answer]: d)
[Explain]: Tractor protection system（牵引车保护系统）的核心作用，是在 trailer（挂车）发生严重漏气或分离时，保护 tractor（牵引车）自身不要把全部 air pressure（气压）都损失掉。根据 DCV 逻辑，当 main reservoir pressure（主储气罐压力）降到大约 20 psi 到 45 psi 的区间时，系统必须自动 shut off air supply to the trailer（切断向挂车供气），否则 tractor 侧也会继续失压，最终影响自身 braking capability（制动能力）。
[Reference]: DCV – Tractor Protection System / Trailer Supply

#R14-05 Regardless of maintenance policies, who is responsible for ensuring the brakes of a vehicle are in working order before the vehicle is placed into operation?

a) The driver.
b) The mechanic.
c) The owner.
d) Both the owner and mechanic.
[Correct Answer]: a)
[Explain]: 即使 owner（车主）负责维护、mechanic（技师）负责维修，driver（驾驶员）仍然是把车辆实际开上路的人，因此在 vehicle is placed into operation（车辆投入运行）之前，driver 必须确认 brakes（制动）处于 working order（可正常工作状态）。这体现的是 final responsibility（最终责任）原则：别人可以维修和管理，但决定“这辆车现在能不能安全上路”的最终责任在驾驶员。
[Reference]: DCV – Driver Responsibility / Pre-trip Inspection

#R14-06 If the foot valve and hand valve are operated at the same time, the trailer application pressure will be?

a) The greater pressure between the hand valve and the foot valve
b) The foot valve pressure
c) The hand valve pressure
d) The pressure in the primary reservoir
[Correct Answer]: a)
[Explain]: Trailer service brakes（挂车行车制动）既可以由 foot valve（脚阀）控制，也可以由 hand valve（手控阀）单独控制。在两者同时作用时，系统不会简单相加，而是由 valve arrangement（阀门布置）决定 trailer application pressure（挂车制动施加压力）取其中较高的一路。这样设计是为了确保 trailer brakes 得到足够且明确的控制信号，而不会因两个不同来源同时工作而产生混乱或压力抵消。
[Reference]: DCV – Valves / Hand Valve / Foot Valve

#R14-07 The main purpose of the tractor protection valve is?

a) To apply the trailer brakes if the trailer breaks away
b) To apply the tractor brakes if the trailer breaks away
c) To apply both the tractor and the trailer brakes if the trailer breaks away
d) To prevent total loss of air from the tractor if the trailer breaks away
[Correct Answer]: d)
[Explain]: Tractor protection valve（牵引车保护阀）的名字已经说明重点：它首先“protects the tractor（保护牵引车）”。如果 trailer breaks away（挂车脱离）或 supply line（供气线）严重泄漏，最危险的情况是 tractor 的 air supply（气源）被持续抽空。这个阀门的主要目的，就是自动切断相关气路，prevent total loss of air from the tractor（防止牵引车空气全部流失），从而保住 tractor 自身的 braking system。
[Reference]: DCV – Tractor Protection Valve

#R14-08 The only way to be sure that your brakes are properly adjusted is by:

a) Feeling the response on a light air application
b) Checking the pressure gauges
c) Physically checking the light air application
d) Physically checking each brake
[Correct Answer]: d)
[Explain]: Brake adjustment（制动调整）不能靠“感觉差不多”来判断。Light air application（轻踩刹车）的手感、pressure gauges（压力表）读数，都不能告诉你每个 brake assembly（制动总成）的实际 push rod travel（推杆行程）是否合格。题目强调 the only way to be sure（唯一能确定的方法），因此答案必须是 physically checking each brake（逐个制动器进行实际检查），这符合 DCV 对 foundation brake inspection（基础制动检查）的要求。
[Reference]: DCV – Foundation Brakes / Adjustment Check

#R14-09 If slack adjuster travel is checked on a Type 30 brake chamber with a manual slack adjuster during a brake application, travel should not exceed?

a) One and a half inches
b) Three quarters of an inch
c) Two and a half inches
d) One and three quarter inches
[Correct Answer]: d)
[Explain]: 这题考的是 applied stroke（施压行程），不是 free play（自由行程）。题目明确说是在 brake application（制动施加时）检查，而且是 Type 30 brake chamber 配 manual slack adjuster。按照 DCV 的行程标准，这种组合的 push rod travel（推杆行程）不能超过 1 3/4 inches。若超过此值，说明 brake is out of adjustment（制动调整不当），可能导致 braking force（制动力）不足，严重时还可能出现 bottoming out（触底）风险。
[Reference]: DCV – Foundation Brakes / Push Rod Travel Limits

#R14-10 A quick release valve may be used with spring brakes to:

a) Allow faster application of spring brakes
b) Allow faster release of spring brakes
c) Allow automatic application of spring brakes
d) Both a and b.
[Correct Answer]: a)
[Explain]: 这题你要求我忠于题库答案，因此我按题库保留 a)。题库逻辑是：quick release valve（快放阀）在某些 spring brake arrangement（弹簧制动布置）中可帮助气路动作更迅速，从而 allow faster application（更快施加）spring brakes。这里我不改题库答案，只按题库答案来写解释。
[Reference]: DCV – Valves / Spring Brake Circuits

#R14-11 Why are drivers required to complete a trip inspection report?

a) For the owner's records.
b) This is a requirement under the Motor Vehicle Act Regulations.
c) For the vehicle maintenance log.
d) For the driver's records.
[Correct Answer]: b)
[Explain]: Trip inspection report（行程检查报告）不是“顺手记一下”的内部表格，而是法律和法规层面的要求。题目里最关键的词是 required（被要求必须完成），因此正确原因不是为了谁留档，而是 because it is a requirement under the Motor Vehicle Act Regulations（因为机动车法规要求必须这样做）。
[Reference]: DCV – Trip Inspection / Regulations

#R14-12 When should a driver adjust automatic slack adjusters?

a) When these are found to be out-of-adjustment.
b) Every day during the pre-trip inspection.
c) Only when stuck in Thunderbay, ON or Gatineau, QC.
d) Only as an emergency procedure that will allow the driver to get to a shop to have it fixed by a qualified technician.
[Correct Answer]: d)
[Explain]: Automatic slack adjusters（自动间隙调节器）原则上不应作为日常手动调整项目，因为“自动”本身意味着系统应自行维持正常 adjustment（调整）。如果它已经 out-of-adjustment（失调），通常说明系统有故障。DCV 逻辑是：driver 只应在 emergency procedure（紧急情况下）临时处理，以便把车辆安全地带到 shop（维修点），然后由 qualified technician（合格技师）做真正的修复。
[Reference]: DCV – Automatic Slack Adjusters / Maintenance

#R14-13 What will occur if the supply line is ruptured?

a) The tractor brakes will apply immediately
b) All air from the trailer reservoirs will be lost
c) The trailer brakes will apply immediately
d) The relay valve will apply the services brakes
[Correct Answer]: c)
[Explain]: Supply line（供气线，也常与 trailer emergency side 相关）一旦 ruptured（破裂），trailer side 会把这视为严重 air loss（失压）情况，从而触发 emergency braking action（紧急制动动作）。因此最直接结果是 the trailer brakes will apply immediately（挂车制动会立即施加），而不是先等驾驶员再去踩 foot valve。
[Reference]: DCV – Trailer Supply Line / Emergency Braking

#R14-14 In a dual circuit air system, what valve is used to protect the primary circuit from an air loss in the secondary circuit?

a) The one-way check valve
b) The dual circuit foot valve
c) The two-way check valve
d) The tractor protection valve
[Correct Answer]: c)
[Explain]: 在 dual circuit air system（双回路气刹系统）中，primary circuit 和 secondary circuit 必须尽量避免互相拖累。Two-way check valve（双向止回阀）可根据哪一路有可用压力来选择气源，同时阻止故障一路把另一侧压力拖空。因此，题目问“保护 primary circuit 免受 secondary circuit 失压影响”，对应的就是 two-way check valve。
[Reference]: DCV – Dual Circuit Systems / Check Valves

#R14-15 How often should you inspect your vehicle?

a) Once a month.
b) Before the vehicle is used each day and at the end of the final trip each day.
c) First thing in the morning.
d) Before each trip.
[Correct Answer]: b)
[Explain]: 题目考的是法规要求，而不是驾驶员习惯。According to the rule structure in DCV，vehicle inspection（车辆检查）至少应在车辆每日首次使用前进行，同时在当天最后一趟结束后再完成相应记录。选项 b 比“first thing in the morning”更完整，也比“before each trip”更贴近题库给出的正式要求。
[Reference]: DCV – Trip Inspection Requirements

#R14-16 When are you required to complete a pre-hill inspection?

a) Before every hill.
b) At the start of the trip if you will be driving mountainous roads.
c) When you see a posted sign instructing you to check brakes before a steep hill.
d) All of the above.
[Correct Answer]: c)
[Explain]: Pre-hill inspection（坡前检查）并不是“见坡就做”或“一天开始统一做一次”这么简单。题目问的是 required（被要求必须做）的条件，因此关键在 posted sign（路边标志）是否明确 instructing you to check brakes（要求你检查制动）。这类标志具有强制性，所以答案是 c)。
[Reference]: DCV – Downgrade Safety / Regulatory Signs

#R14-17 If the speed of a vehicle is doubled, braking power needed to stop must be increased by:

a) 2 times
b) 4 times
c) 6 times
d) 8 times
[Correct Answer]: b)
[Explain]: 这题考的是 braking physics（制动物理）。Vehicle kinetic energy（车辆动能）与 speed 的平方相关，因此如果 speed is doubled（速度翻倍），要在相同 stopping distance（停车距离）内停下来，所需 braking power 必须增加到 4 times。不是 2 倍，也不是 8 倍。
[Reference]: DCV – Braking Physics

#R14-18 Proper air brake adjustment on a vehicle equipped with foundation brakes is determined by?

a) The size of the brake chambers
b) The length of the slack adjusters
c) Thickness of brake lining
d) The brake chamber push rod travel
[Correct Answer]: d)
[Explain]: Proper air brake adjustment（正确的气刹调整）并不是看 brake chamber 多大、slack adjuster 多长，或 lining 有多厚，而是看 brake chamber push rod travel（制动气室推杆行程）是否在允许范围内。因为实际制动效果最终体现在 push rod 行程是否过大、是否还能有效驱动 foundation brakes。
[Reference]: DCV – Foundation Brakes / Push Rod Travel

#R14-19 Which will cause trailer brakes to apply immediately?

a) Loss of pressure to the service line
b) Loss of pressure to the supply line
c) Loss of pressure to the hand valve
d) A defective one-way check valve
[Correct Answer]: b)
[Explain]: Trailer brakes 的 emergency application（紧急施加）通常与 supply line（供气线）失压直接相关。因为这条线路一旦压力丢失，系统会把情况视为 trailer breakaway 或严重故障，从而使 trailer brakes apply immediately（挂车制动立刻施加）。
[Reference]: DCV – Trailer Emergency Braking / Supply Line

#R14-20 Which valve is octagon-shaped (eight-sided), red and located on the dash in the truck?

a) Treadle valve
b) Parking valve
c) Two-way check valve
d) Trailer Supply Valve
[Correct Answer]: d)
[Explain]: 这题考的是 dashboard control identification（驾驶室控制识别）。Trailer Supply Valve（挂车供气阀）通常是红色、八边形，并位于 dash（仪表台）上。它与 parking valve、treadle valve 在外观和位置上都不同，因此这是一个识别类题目。
[Reference]: DCV – Driver Controls / Trailer Supply Valve

#R14-21 How do you know you are turning the adjusting bolt in the correct direction when adjusting a manual slack adjuster?

a) The slack adjuster doesn't move.
b) The slack adjuster will pull the pushrod out of the chamber.
c) The cam rotates in the same direction as if the brakes were being applied.
d) The slack adjuster pushes the pushrod into the chamber.
[Correct Answer]: c)
[Explain]: 调 manual slack adjuster（手动间隙调节器）时，正确方向不是单纯背“顺时针/逆时针”，而是看 S-cam / cam rotation（凸轮旋转）是否与 brakes being applied（制动施加时）方向一致。这个判断方法比机械记忆方向更可靠，因为不同结构中螺栓朝向可能不同。
[Reference]: DCV – Manual Slack Adjuster Adjustment

#R14-22 Improper angle between slack adjuster and chamber push rod (when applied) can be corrected by:

a) Pumping the brakes.
b) Relining the brakes.
c) Changing the length of the push rod.
d) Adjusting the brakes.
[Correct Answer]: d)
[Explain]: 当 slack adjuster 与 chamber push rod 在 applied position（施压状态）下的角度不正确时，通常反映的是 brake adjustment（制动调整）不正确，而不是要去改 push rod 长度或直接换 lining。正确做法是 adjust the brakes（重新调整制动），让几何关系恢复到正确工作范围。
[Reference]: DCV – Brake Geometry / Slack Adjuster Adjustment

#R14-23 The normal pressure in the airbrake system is controlled by the:

a) Pressure relief valve
b) Safety valve
c) Governor
d) All of the above
[Correct Answer]: c)
[Explain]: Airbrake system 的 normal pressure（正常工作压力）由 governor（调压器）控制。Pressure relief valve 或 safety valve 主要是异常情况下的保护装置，不负责日常让系统在正常 cut-in / cut-out 区间内工作。因此 controlling normal pressure 的核心部件是 governor。
[Reference]: DCV – Governor / Air Pressure Control

#R14-24 "Brake lag" is approximately 4/10 of a second in a well-maintained brake system; What is meant by the term brake lag?

a) The time it takes from the moment a hazard is recognized to the time the brakes are applied
b) The actual time the vehicle takes to stop after the brakes are applied
c) The time the air pressure takes to fully apply the brakes after the foot valve is depressed
d) The time it takes to stop the vehicle after the hazard is recognized
[Correct Answer]: c)
[Explain]: Brake lag（制动迟滞）不是驾驶员反应时间，也不是整个车辆停止所需时间。它专门指：在 foot valve is depressed（踩下脚阀）之后，air pressure 通过系统传递并 fully apply the brakes（把制动完全施加）所花的时间。在维护良好的 air brake system 中，这个时间大约是 4/10 秒。
[Reference]: DCV – Brake Lag / Stopping Distance Components

#R14-25 In the event of air loss in one circuit of a dual circuit air brake system, the remaining circuit will?

a) Activate the spring brakes
b) Continue to operate
c) Activate the trailer brakes
d) Prevent steering tire lock up
[Correct Answer]: b)
[Explain]: Dual circuit air brake system（双回路气刹系统）的最大优点之一，就是 redundancy（冗余）。如果 one circuit 失压，the remaining circuit will continue to operate（剩余回路仍可继续工作），这样车辆不会因为单一回路故障而立刻丧失全部 braking ability。
[Reference]: DCV – Dual Circuit Air Brake Systems

#R14-26 The actual distance the vehicle travels after brakes are applied until the vehicle stops is:

a) Braking distance.
b) Stopping distance
c) Reaction time.
d) 100 meters.
[Correct Answer]: a)
[Explain]: Braking distance（制动距离）是一个定义题。它只包括 brakes are applied（刹车已经施加）之后，到 vehicle stops（车辆完全停止）之前所走过的距离。它不包括 reaction distance（反应距离）或 brake lag distance。
[Reference]: DCV – Stopping Distance Components

#R14-27 If 40 PSI is exerted against a diaphragm of 30 square inches, the maximum force exerted would be:

a) 1200 lbs of force
b) 70 lbs of force
c) 7200 lbs of force
d) 3500 lbs of force
[Correct Answer]: a)
[Explain]: 这题是 brake chamber force calculation（制动气室受力计算）。公式很直接：Force = Pressure × Area。40 PSI × 30 square inches = 1200 lbs of force。因此答案是 a)。这体现了 diaphragm（膜片）面积越大、压力越高，输出机械力越大的原理。
[Reference]: DCV – Brake Chambers / Force Calculation

#R14-28 In a dual circuit system, the primary circuit supplies air to?

a) The front brake chambers
b) The rear tractor brakes
c) The main brake reservoir
d) The tractor protection valve
[Correct Answer]: b)
[Explain]: 在很多标准 dual circuit layout（双回路布局）中，primary circuit（主回路）供给 rear tractor brakes（牵引车后制动），secondary circuit 则通常与 front brakes 相关。题目考的是典型回路分工，因此答案是 rear tractor brakes。
[Reference]: DCV – Dual Circuit Layout

#R14-29 What two valves make up the tractor protection system?

a) The trailer supply valve and the hand valve
b) The trailer supply valve and the tractor protection valve
c) The trailer supply valve and the foot valve
d) The trailer supply valve and the relay emergency valve
[Correct Answer]: b)
[Explain]: Tractor protection system（牵引车保护系统）并不是单独只有一个 valve，而是由 trailer supply valve（挂车供气阀）和 tractor protection valve（牵引车保护阀）共同构成。一个负责驾驶员控制，另一个负责系统自动保护。
[Reference]: DCV – Tractor Protection System

#R14-30 In a dual circuit air system, air from both the primary and secondary air reservoirs is directed to?

a) The relay valve
b) The one-way check valve
c) The foot valve
d) The emergency relay valve
[Correct Answer]: c)
[Explain]: 在 dual circuit air system 中，air from both primary and secondary reservoirs 会进入 dual foot valve / foot valve arrangement（双回路脚阀结构），由驾驶员踩踏后分别控制对应回路的制动施加。因此题目问两路空气“被导向哪里”，答案是 foot valve。
[Reference]: DCV – Dual Foot Valve / Dual Circuit Control

#R15-01 If the weight of a vehicle is doubled, braking power needed to stop must be increased by:

a) 2 times
b) 4 times
c) 6 times
d) 8 times
[Correct Answer]: a)
[Explain]: 当 vehicle weight（车辆重量）增加时，为在相同 stopping distance（制动距离）内停车，所需 braking power（制动力）必须相应增加。此题仅考虑重量因素（不涉及速度变化），因此需要增加到 2 times（两倍）。
[Reference]: DCV – Braking Principles

#R15-02 To control speed on a downgrade, it is a good practice to?

a) Pump the brakes rapidly
b) Hard application allow time to cool
c) Set the hand valve
d) Select the correct gear with small even brake applications
[Correct Answer]: d)
[Explain]: 在 downgrade（下坡）时，应使用 correct gear selection（合适档位）配合 small even brake applications（小而均匀的制动），以避免 brake overheating（制动过热）和 brake fade（制动衰退）。
[Reference]: DCV – Braking on Downgrades

#R15-03 The maximum main reservoir pressure in an air brake system may vary between 105 & 125 PSI. The minimum pressure at which the compressor should cut back in is:

a) 20 - 40 PSI
b) 50 - 80 PSI
c) 63 - 78 PSI
d) 85 - 105 PSI
[Correct Answer]: d)
[Explain]: Governor（调压器）控制 compressor cut-in（恢复泵气）压力。该值必须足够高，以确保系统始终有 adequate air pressure（足够气压）支持 braking system。
[Reference]: DCV – Governor / Air Pressure Control

#R15-04 If the weight and speed are doubled, braking power needed to stop must be increased by:

a) 2 times
b) 4 times
c) 6 times
d) 8 times
[Correct Answer]: d)
[Explain]: braking requirement 与 speed² 和 weight 成正比，因此 weight ×2 且 speed ×2 → braking power 需要增加 8 倍。
[Reference]: DCV – Braking Physics

#R15-05 The quick release feature of a relay valve allows for:

a) Faster application of service brakes.
b) Faster release of service brakes.
c) Steering in slippery conditions.
d) Faster release of parking brake.
[Correct Answer]: b)
[Explain]: relay valve 的 quick release 功能可快速排气，从而使 service brakes 更快释放。
[Reference]: DCV – Relay Valve

#R15-06 The compressor must be capable of building up reservoir pressure from 50 PSI to 90 PSI at a fast engine idle in less than:

a) 3 minutes
b) 5 minutes
c) 8 minutes
d) 10 minutes
[Correct Answer]: a)
[Explain]: 该测试用于确认 compressor capacity（压缩机能力）是否符合标准。
[Reference]: DCV – Air Supply System

#R15-07 The foot valve is the valve that:

a) Will automatically adjust to braking needs.
b) Needs reservoir pressure to control it to within 10 PSI.
c) If applied with a steady pressure will maintain balanced braking pressure.
d) Answers a. and b.
[Correct Answer]: c)
[Explain]: foot valve（脚阀）控制 application pressure，并保持 balanced braking（平衡制动）。
[Reference]: DCV – Foot Valve

#R15-08 The most common cause of loss of braking effort on air brake equipped vehicle is:

a) Brake out of adjustment
b) Overheated brake drums
c) Loss of air pressure
d) Worn out brakes
[Correct Answer]: a)
[Explain]: brake out of adjustment（制动调整不当）会导致 push rod travel 过长，从而降低 braking force。
[Reference]: DCV – Foundation Brakes

#R15-09 When drums overheat, they:

a) Improve braking because of the heat build-up due to friction.
b) Expand away from the shoes thus reducing braking efficiency.
c) Glow in the dark.
d) Squeal.
[Correct Answer]: b)
[Explain]: brake drum 受热膨胀，导致接触减弱，从而降低 braking efficiency。
[Reference]: DCV – Brake Fade

#R15-10 What is a safety actuator parking brake?

a) An automatic park brake
b) A spring brake lock
c) A one-way locking mechanism
d) An air-operated parking brake
[Correct Answer]: d)
[Explain]: safety actuator parking brake 是 air-operated 结构，用空气控制释放。
[Reference]: DCV – Spring Brakes


#R15-11 Brake lag is defined as:

a) The time it takes from the moment a hazard is recognized to the time the brake is applied.
b) The time it takes the air to travel through the air brake system.
c) The time it takes for the driver to decide what to do in an emergency.
d) The time it takes to apply pressure to the treadle.
[Correct Answer]: b)
[Explain]: brake lag（制动滞后）指从 foot valve 被踩下，到 compressed air（压缩空气）通过 air lines 并 fully apply brakes（完全施加制动）之间的时间延迟。
[Reference]: DCV – Brake Lag

#R15-12 The maximum pressure available at any given time for a full brake application depends on:

a) The size of the brake chamber.
b) The distance between the brake valve and the chamber.
c) The size of the diaphragms.
d) The pressure in the reservoirs.
[Correct Answer]: d)
[Explain]: full brake application 的最大可用压力取决于 reservoir pressure（储气罐压力），因为所有制动气源来自该储备。
[Reference]: DCV – Air Supply System

#R15-13 Brake heat is dissipated in a drum brake system by:

a) Holding a constant 10 PSI brake application.
b) Brake drums to atmosphere.
c) Coasting in neutral.
d) Brake air conditioning.
[Correct Answer]: b)
[Explain]: brake heat（制动产生的热量）通过 brake drums 向 surrounding air（周围空气）散发。
[Reference]: DCV – Heat Dissipation

#R15-14 A bob-tail proportioning valve…

a) Increases brake pressure to the drive axles when not attached to a trailer
b) Moves a disabled vehicle to a stop
c) Prevents drive axles skid when not attached to a trailer
d) Allows the driver to use the hand valve without a trailer
[Correct Answer]: c)
[Explain]: bob-tail（无挂车状态）时，该 valve 减少 drive axle braking force，防止 skid（打滑）。
[Reference]: DCV – Brake Balance

#R15-15 In which direction should the adjusting nut be turned to tighten the brakes?

a) Clockwise
b) Counter clockwise
c) “S” cam shaft rotates in the same direction as brake application
d) “S” cam shaft rotates in the opposite direction as a brake application
[Correct Answer]: c)
[Explain]: 判断方向的关键是 cam rotation（凸轮旋转方向）与 brake application 一致。
[Reference]: DCV – Slack Adjuster

#R15-16 If excessive movement develops in the slack adjuster:

a) The driver must pump the treadle to increase the braking effort.
b) The warning buzzer will sound when the brakes are applied.
c) The diaphragms could bottom in the chamber, resulting in brake failure.
d) The brakes will lock.
[Correct Answer]: c)
[Explain]: push rod travel 过大可能导致 diaphragm bottoming out（触底），从而失去制动力。
[Reference]: DCV – Foundation Brakes

#R15-17 Where would an air dryer be installed in a standard air brake system?

a) Between the compressor and the wet tank.
b) Between the primary and the secondary tank.
c) Between the tanks and the air brakes.
d) Between the primary tank and the wet tank.
[Correct Answer]: a)
[Explain]: air dryer 安装在 compressor 之后，用于去除 moisture（湿气）。
[Reference]: DCV – Air Dryer

#R15-18 What is the purpose of a spring brake modulator valve?

a) To adjust brakes automatically
b) To increase braking in slippery weather
c) To provide rear braking if primary system fails
d) To signal parking brake failure
[Correct Answer]: c)
[Explain]: modulator valve 在 system failure 时调节 spring brake 以提供 controlled braking。
[Reference]: DCV – Spring Brake System

#R15-19 Before making the full brake application test on a vehicle equipped with spring brakes, why should the driver release the spring brakes?

a) To obtain a true gauge reading.
b) To permit the brakes to apply fully.
c) To prevent damage to the slack adjusters by compounding the pressure.
d) To prevent the brakes from applying fully.
[Correct Answer]: c)
[Explain]: 防止 compounding（复合制动）造成 excessive force 损坏组件。
[Reference]: DCV – Compounding

#R15-20 If, after you have started your trip, the brakes do not seem to be holding and the reservoir pressure is satisfactory, you should:

a) Travel at reduced speeds.
b) Stop, check brakes, and adjust if necessary.
c) Report the condition at the end of the trip.
d) Apply spring brakes.
[Correct Answer]: b)
[Explain]: 即使 pressure 正常，brake failure 仍需立即检查。
[Reference]: DCV – Safety

#R15-21 What does the term “bottoming out” refer to in an air brake system?

a) The brake chamber hits the truck frame when applied
b) The foot valve hits the floor when applied
c) The reservoirs total depletion
d) The push rod travels to the base of the brake chamber
[Correct Answer]: d)
[Explain]: push rod 行程过长触底，失去制动能力。
[Reference]: DCV – Brake Chamber

#R15-22 Spring type parking brakes are held in the released position by:

a) Spring pressure.
b) Air pressure.
c) Application pressure.
d) Treadle pressure.
[Correct Answer]: b)
[Explain]: spring brakes 通过 air pressure 保持释放状态。
[Reference]: DCV – Spring Brakes

#R15-23 What is the legal minimum to maximum main reservoir pressure for air brake equipped vehicles?

a) 50 psi to 90 psi
b) 80 psi to 85 psi
c) 105 psi to 135 psi
d) 105 psi to 150 psi
[Correct Answer]: c)
[Explain]: 法规规定的正常 operating pressure range。
[Reference]: DCV – Pressure Limits

#R15-24 What is a Type 30 long-stroke brake chamber design?

a) A brake chamber used on front brakes
b) Brake chambers designed for 53ft trailers
c) Allows Type 30 brakes to stroke to 3 inches
d) Designed for “A” and “B” trains only
[Correct Answer]: c)
[Explain]: long-stroke design 增加 allowable stroke。
[Reference]: DCV – Brake Chamber Types

#R15-25 The low-pressure warning device must operate when the main reservoir pressure drops to approximately:

a) 20 to 40 PSI
b) 60 to 65 PSI
c) 80 to 85 PSI
d) 105 to 125 PSI
[Correct Answer]: b)
[Explain]: warning device 在约60 psi触发。
[Reference]: DCV – Warning Devices

#R15-26 What must a driver do when a low-pressure warning buzzer sounds?

a) Slow down and rev the engine
b) Stop the vehicle and determine the cause of the air loss
c) Stop if the main air gauge reaches 20 psi to 45 psi
d) Apply the spring brakes immediately
[Correct Answer]: b)
[Explain]: 必须立即查明 air loss 原因。
[Reference]: DCV – Safety

#R15-27 When low-pressure warning buzzer sounds, the driver must:

a) Stop the vehicle clear of traffic and determine the cause of the air loss.
b) Bring the vehicle to a stop if main reservoir gauge indicates the pressure has dropped below 40 PSI.
c) Apply the spring brakes immediately.
d) Continue driving to the nearest maintenance shop.
[Correct Answer]: a)
[Explain]: 停车并确保安全环境。
[Reference]: DCV – Safety

#R15-28 If the brakes are poorly adjusted, the parking brake will be:

a) More effective than the service brake.
b) More difficult to apply.
c) The same effectiveness as the service brake.
d) Less effective than the service brake.
[Correct Answer]: c)
[Explain]: parking brake 使用相同机制，因此效果一致下降。
[Reference]: DCV – Brake Adjustment

#R15-29 The “Truck Stop-Check Brakes” sign in advance of a steep grade is:

a) A warning.
b) A regulation.
c) Information.
d) Both a. and c.
[Correct Answer]: b)
[Explain]: 属于 regulatory sign（必须遵守）。
[Reference]: DCV – Road Signs

#R15-30 Spring brakes are most effective as?

a) A parking brake
b) An emergency braking system when the main reservoir air is depleted
c) A means to increase braking effort with heavy loads
d) A fail safe if you miss the runaway lane
[Correct Answer]: a)
[Explain]: spring brakes 主要用途是 parking。
[Reference]: DCV – Spring Brakes

#R16-01 Blended air is air from:

a) The compressor to the wet tank.
b) The foot valve.
c) Air from both primary and secondary circuits through a 2-way check valve.
d) Air from both the tractor and trailer combined in the check valve.
[Correct Answer]: c)
[Explain]: Blended air（混合气）指来自 primary circuit（主回路）和 secondary circuit（副回路）的空气，经 2-way check valve（双向止回阀）汇合后输出。这样做的目的，是在一个回路压力较低或失效时，系统仍可能从另一回路获得可用 air supply（气源），从而维持 braking control（制动控制）的连续性。
[Reference]: DCV – Dual Air Systems / Check Valves

#R16-02 If the trailer breaks away from the tractor, the trailer will immediately dynamite, and air loss from the tractor must not drain below

a) 60 to 50 PSI
b) 85 to 80 PSI
c) 45 to 20 PSI
d) 125 to 105 PSI
[Correct Answer]: c)
[Explain]: 当 trailer breaks away（挂车脱离）时，挂车制动会立即进入 emergency application（紧急施加），也就是题目中的 dynamite。与此同时，tractor protection system（牵引车保护系统）必须切断失压路径，防止 tractor（牵引车）本身 reservoir pressure（储气压力）继续流失。题库给出的保护区间是 45 to 20 PSI。
[Reference]: DCV – Tractor Protection System

#R16-03 The purpose of making a full brake application with the engine turned off is to?

a) Check the function of the anti-compounding valve
b) Check the governor cut-in pressure
c) Check the emergency relay valve
d) Check that major leaks are not present in the system
[Correct Answer]: d)
[Explain]: 在 engine turned off（发动机关闭）的状态下做 full brake application（完全制动施加），可以观察 system pressure drop（系统压力下降）是否过快。这一步的核心目的是检查 major leaks（重大漏气）是否存在，因为此时 compressor（压缩机）不会补气，任何异常 pressure loss（压力损失）都会更容易被发现。
[Reference]: DCV – Air Brake Pre-trip Inspection

#R16-04 Before checking and adjusting the brakes?

a) System air pressure should be 60 psi
b) Wheels should be blocked
c) The spring brakes should be applied
d) System air should be between 20 psi and 45 psi
[Correct Answer]: b)
[Explain]: 在检查和调整 brakes（制动）之前，最重要的前提是防止 vehicle movement（车辆移动）。因此 wheels should be blocked（车轮必须被挡住）是首要安全条件。无论系统压力是多少，若没有先 block wheels（挡轮），都可能在调整过程中发生滑动或溜车风险。
[Reference]: DCV – Brake Adjustment Safety

#R16-05 To “tug test” the trailer service brake operation:

a) The foot valve should be applied.
b) The hand valve should be applied.
c) The parking brake should be applied.
d) The spring brake should be applied.
[Correct Answer]: b)
[Explain]: Tug test（牵引测试）是用 very slight power（轻微驱动力）去验证某一制动系统是否能 hold（保持住车辆）。如果要单独测试 trailer service brake operation（挂车行车制动），应使用 hand valve（手控阀）来单独向 trailer service line（挂车行车制动线）施加压力，而不是用 foot valve 同时控制整车。
[Reference]: DCV – Hand Valve / Trailer Brake Test

#R16-06 The most common cause of loss of air between the tractor and trailer is:

a) Leaking tractor protection valve.
b) Defective glad hand rubbers.
c) Leaking relay emergency valve.
d) Leaking 2-way check valve.
[Correct Answer]: b)
[Explain]: Tractor 和 trailer 之间最常见的 air loss（漏气）位置，是 glad hand rubbers（气管接头橡胶密封）。因为它们位于连接点，频繁接拆、暴露在 dirt（灰尘）、grit（砂粒）和磨损环境中，最容易出现 sealing failure（密封失效）。
[Reference]: DCV – Tractor-Trailer Connections

#R16-07 The brakes should be adjusted when?

a) The low air warning buzzers sounds on a full application
b) The reservoir drops more than 12 psi with a full application
c) A pre-trip inspection indicates that the push-rod travel exceeds allowable limits
d) The governor puts the compressor in the unload stage
[Correct Answer]: c)
[Explain]: Brakes should be adjusted（应进行制动调整）的最直接依据，是在 pre-trip inspection（出车前检查）中发现 push-rod travel（推杆行程）超过 allowable limits（允许范围）。这说明 brake adjustment（制动调整）已经不合格，会降低 braking efficiency（制动效率）甚至造成制动失效风险。
[Reference]: DCV – Foundation Brakes / Push Rod Travel

#R16-08 The main purpose of a hand valve is:

a) To control independently the amount of air to the trailer brakes.
b) To control the amount of air application to the tractor brakes.
c) To use as an emergency brake if the foot valve fails.
d) To control the amount of air application to the treadle valve.
[Correct Answer]: a)
[Explain]: Hand valve（手控阀）的主要用途，是 independently control（独立控制）trailer brakes（挂车制动）的空气施加量。它不是设计来控制 tractor brakes（牵引车制动），也不是作为 foot valve 故障时的正式 emergency brake（紧急制动）替代。
[Reference]: DCV – Hand Valve

#R16-09 If you are adjusting an automatic slack adjuster that has a square head adjusting bolt, you must rotate the adjusting bolt in which direction?

a) Clockwise.
b) Counter-clockwise.
c) Up.
d) Down.
[Correct Answer]: b)
[Explain]: 对于题目中所说 square head adjusting bolt（方头调整螺栓）的 automatic slack adjuster（自动间隙调节器），正确调整方向是 counter-clockwise（逆时针）。这类题考的是 specific hardware orientation（具体硬件方向），不是一般原理题，因此必须记住题库答案对应的具体方向。
[Reference]: DCV – Slack Adjuster Adjustment

#R16-10 When checking the push rod travel during a pre-trip inspection, the brakes need to be adjusted if the travel exceeds:

a) 1/2 inch.
b) 1 inch.
c) 1 1/4 inch.
d) 3/4 inch.
[Correct Answer]: d)
[Explain]: 这题考的是 pre-trip inspection 中用特定方法检查 push rod travel（推杆行程）时的 adjustment limit（调整限值）。当 travel exceeds（超过）3/4 inch，就表示 brake is out of adjustment（制动失调），需要调整。
[Reference]: DCV – Slack Adjuster / Pre-trip Limits

#R16-11 What is total stopping distance?

a) Total braking distance and brake lag distance
b) Total reaction distance, brake lag distance and braking distance
c) Total brake lag distance and reaction distance
d) Distance it takes to stop in slick road conditions
[Correct Answer]: b)
[Explain]: Total stopping distance（总停车距离）由三个部分组成：reaction distance（反应距离）、brake lag distance（制动迟滞距离）和 braking distance（制动距离）。题目考查的是完整构成，而不是其中两部分的组合。
[Reference]: DCV – Stopping Distance Components

#R16-12 An application air gauge indicates?

a) The pressure in the primary system
b) The pressure in the wet tank
c) The pressure in the anti compounding valve
d) The approximate pressure in the brake chamber
[Correct Answer]: d)
[Explain]: Application air gauge（应用气压表）显示的是 approximate pressure in the brake chamber（制动气室中的大致压力），也就是当前 brake application（制动施加）传递到制动器的空气压力，而不是 reservoir pressure（储气压力）本身。
[Reference]: DCV – Gauges / Brake Chamber Pressure

#R16-13 When a tractor and trailer are coupled together and a 30 PSI foot valve application is made, a greater air application to the trailer brakes can be made by use of the:

a) Hand valve.
b) Safety valve.
c) Foot valve.
d) Trailer relay valve.
[Correct Answer]: a)
[Explain]: 当 tractor and trailer are coupled（牵引车与挂车已连接）时，如果已经有 30 PSI foot valve application，但还想让 trailer brakes（挂车制动）得到更高的施加压力，可以通过 hand valve（手控阀）单独增加 trailer service application。题目考的是 hand valve 的独立控制特性。
[Reference]: DCV – Hand Valve / Trailer Brake Control

#R16-14 The purpose of a relay valve is to:

a) Charge the trailer reservoir with main reservoir air.
b) Provide a quicker application and release of the brakes.
c) Provide a means of releasing the spring brakes in an emergency situation, when reservoir pressure has dropped.
d) Gauge the air pressure in the reservoir.
[Correct Answer]: b)
[Explain]: Relay valve（继动阀）的主要作用，是缩短 air travel path（空气传输路径），从而 provide a quicker application and release（更快地施加与释放制动）。它的核心价值在于 reduce brake lag（减少制动迟滞），尤其适用于距离 foot valve 较远的 axle brakes（车轴制动）。
[Reference]: DCV – Relay Valve / Brake Lag

#R16-15 With tractor and trailer coupled, the air pressure present in the service line is:

a) 60 PSI.
b) The pressure in the reservoir.
c) The pressure applied by the hand valve or foot valve.
d) The treadle pressure.
[Correct Answer]: c)
[Explain]: Service line（行车制动线）中的 air pressure 不是固定值，也不是 reservoir 全压，而是由 hand valve 或 foot valve 当前施加的 control pressure（控制压力）决定。也就是说，service line pressure 随 driver brake input（驾驶员制动输入）变化。
[Reference]: DCV – Service Line / Brake Application

#R16-16 At what RPM is the engine set when performing the air pre-trip inspection?

a) 600 RPM to 900 RPM
b) 1500 RPM to 2000 RPM
c) 800 RPM to 1400 RPM
d) 1000 RPM to 1300 RPM
[Correct Answer]: d)
[Explain]: 在 air pre-trip inspection（气刹预检）中，为了测试 compressor build-up performance（压缩机建压性能），engine 通常需要保持在一个 elevated idle（较高怠速）范围。题库给出的标准是 1000 RPM to 1300 RPM。
[Reference]: DCV – Air Brake Pre-trip Inspection / Build-up Test

#R16-17 How are the service brakes tested to ensure that they are working properly?

a) On back roads away from other traffic
b) Pump the brake pedal and read the gauges
c) Drive slowly forward and apply the brakes
d) Drive slowly when first entering traffic
[Correct Answer]: c)
[Explain]: 要确认 service brakes（行车制动）是否 working properly（工作正常），应在安全条件下 drive slowly forward（慢速前进）并实际 apply the brakes（施加制动）。这属于动态功能测试，能直接感受 braking response（制动反应）是否正常。
[Reference]: DCV – Service Brake Test

#R16-18 If the trailer breaks away from the tractor, the trailer brakes would be activated by the action of:

a) The tractor protection valve.
b) The highway valve.
c) The check valve.
d) The trailer relay valve.
[Correct Answer]: d)
[Explain]: 当 trailer breaks away 时，trailer brakes 的紧急施加依赖 trailer relay valve / relay emergency valve 的动作。它会感知供气异常并使 trailer emergency braking 生效。题库答案指定为 trailer relay valve。
[Reference]: DCV – Trailer Relay Emergency Valve

#R16-19 If you make a full brake application (spring brakes released), push rod travel must not exceed:

a) 2 1/4 inches.
b) the speed limit.
c) 1 1/2 inches
d) 1 3/4 inches.
[Correct Answer]: d)
[Explain]: 这题考的是 applied stroke limit（施压行程上限）。在 spring brakes released（弹簧制动释放）的情况下做 full brake application，push rod travel 不应超过 1 3/4 inches。超过这个范围，说明 brake is out of adjustment。
[Reference]: DCV – Push Rod Travel / Applied Stroke

#R16-20 What is stopping distance?

a) Total braking distance and brake lag distance.
b) Total reaction distance, brake lag distance and braking distance.
c) Total brake lag distance and reaction distance.
d) Distance it takes to stop in slick road conditions.
[Correct Answer]: b)
[Explain]: 这题中的 stopping distance 与 total stopping distance 逻辑一致，包含 reaction distance、brake lag distance 和 braking distance 三部分。它不是单纯的 braking distance，也不是仅两部分的组合。
[Reference]: DCV – Stopping Distance

#R16-21 What are foundation brakes?

a) The mechanical part of the brake assembly
b) The brakes used on tour buses
c) The brakes found in hydraulic braking systems
d) The valves that reduce lag
[Correct Answer]: a)
[Explain]: Foundation brakes（基础制动器）指 brake assembly 中真正执行机械制动动作的部分，例如 brake chamber 后端所驱动的 slack adjuster、S-cam、brake shoes、lining、drum 等机械组件。它们不是 valves，也不是特定车型专用。
[Reference]: DCV – Foundation Brakes

#R16-22 When an old, single-circuit trailer is disconnected and left parked, you must:

a) Make sure the trailer is dynamited.
b) Block the wheels.
c) Make sure the brakes are properly adjusted.
d) Make sure the spring brake is in the correct position.
[Correct Answer]: b)
[Explain]: 如果是 old, single-circuit trailer（老式单回路挂车），且 without spring brakes，则在 disconnected and left parked（脱挂并停放）时，必须 block the wheels（挡住车轮）。因为系统气压可能逐渐流失，挂车可能自行移动。
[Reference]: DCV – Parking Safety / Single-circuit Trailer

#R16-23 What would be indicated if the safety valve blows?

a) The compressor filter may be plugged
b) The one-way check valve may be faulty
c) The quick release valve is plugged
d) The governor may be faulty
[Correct Answer]: d)
[Explain]: 如果 safety valve blows（安全阀放气），最直接说明 system pressure 已超过正常控制范围。正常情况下 governor 控制 compressor cut-out pressure，因此 safety valve 动作最可能表示 governor may be faulty（调压器可能故障）。
[Reference]: DCV – Governor / Safety Valve

#R16-24 Proper air brake adjustment on a vehicle equipped with foundation brakes is determined by?

a) The size of the brake chambers
b) The length of the slack adjusters
c) Thickness of brake lining
d) The brake chamber push rod travel
[Correct Answer]: d)
[Explain]: Proper air brake adjustment（正确气刹调整）的判断关键，是 brake chamber push rod travel（制动气室推杆行程）是否在规定范围内。其他因素如 chamber size、slack adjuster length、lining thickness 都不是直接判断 adjustment 是否合格的标准。
[Reference]: DCV – Foundation Brakes / Push Rod Travel

#R16-25 In the event of loss of air in one circuit of the dual braking system (tractor with trailer attached):

a) The remaining circuit will have full braking capability, so long as the compressor continues to function normally.
b) The circuit will immediately activate the spring brakes.
c) Only the trailer brakes will be functional.
d) Both the tractor and trailer brakes will be functional.
[Correct Answer]: a)
[Explain]: Dual braking system（双回路制动系统）的主要优点是 redundancy（冗余）。如果 one circuit 失压，只要 compressor continues to function normally（压缩机仍正常工作），the remaining circuit 仍可提供 full braking capability according to the system design in this question。
[Reference]: DCV – Dual Air Brake Systems

#R16-26 If the main discharge line between the compressor and the reservoirs ruptured, sudden air loss from the reservoirs would be prevented by the action of:

a) The tractor protection valve.
b) The emergency valve.
c) The 1-way check valves.
d) The glad hand rubbers.
[Correct Answer]: c)
[Explain]: Main discharge line rupture（主排气线破裂）可能导致空气从 compressor 一侧大量流失，但 1-way check valves（单向止回阀）会阻止 reservoir air 反向泄回，从而 prevent sudden air loss from the reservoirs（防止储气罐气压突然流失）。
[Reference]: DCV – One-way Check Valves / Air Supply System

#R16-27 Automatic slack adjusters, when installed:

a) Never need checking.
b) Should be checked occasionally for correct adjustment.
c) Should be checked regularly by the mechanic on duty.
d) Need to be checked regularly to ensure correct adjustment is maintained.
[Correct Answer]: d)
[Explain]: Automatic slack adjusters 并不等于“不用检查”。相反，即使已安装 automatic slack adjusters，也 still need to be checked regularly（仍需定期检查），以确保它们 truly maintain correct adjustment（确实维持了正确调整）。
[Reference]: DCV – Automatic Slack Adjusters / Inspection

#R16-28 How can the holding power of the trailer service brakes be tested?

a) Parking brakes.
b) Wheel chocks.
c) Hand valve.
d) Treadle valve.
[Correct Answer]: c)
[Explain]: Trailer service brakes 的 holding power（保持能力）测试，应使用 hand valve（手控阀）单独施加 trailer brakes，再做 tug test 或相关检查。用 foot valve / treadle valve 会同时作用整车，不利于单独判断 trailer side 的性能。
[Reference]: DCV – Trailer Brake Test / Hand Valve

#C01-01 What may happen if you drive without a valid driver’s licence and are involved in a crash?

a) Insurance always covers all damages
b) Your insurance claim may be denied
c) You only receive a warning
d) Your vehicle is automatically impounded

[Correct Answer]: b)
[Explain]: 如果驾驶员没有 valid driver’s licence（有效驾照）或正确等级驾照，发生事故后 insurance claim（保险理赔）可能被拒绝。
[Reference]: Chapter 1 – Licence Requirements

#C01-02 What must you hold before applying for a commercial licence, heavy trailer endorsement or house trailer endorsement?

a) Learner licence
b) Motorcycle licence
c) Full-privilege Class 5 licence
d) Air brake endorsement

[Correct Answer]: c)
[Explain]: 在申请 commercial licence（商业驾照）、heavy trailer endorsement（重型挂车资格）或 house trailer endorsement（房车挂车资格）前，必须持有 full-privilege Class 5 licence（完整5级驾照）或同等级驾照。
[Reference]: Chapter 1 – Commercial Licence Eligibility

#C01-03 What is a special activity bus?

a) A city transit bus
b) A school-operated bus without a fixed schedule
c) A taxi vehicle
d) A highway maintenance vehicle

[Correct Answer]: b)
[Explain]: special activity bus（特殊活动巴士）是学校运营、但不按固定时刻表运行的巴士。
[Reference]: Chapter 1 – Definitions

#C01-04 What is a special vehicle designed for?

a) Highway paving work
b) Carrying hazardous goods
c) Public transportation for people with disabilities
d) Heavy trailer towing

[Correct Answer]: c)
[Explain]: special vehicle（特殊车辆）专门设计或改装用于为 people with disabilities（残障人士）提供公共交通服务。
[Reference]: Chapter 1 – Definitions

#C01-05 Where can you find more information about towing recreational trailers?

a) At a fuel station
b) On icbc.com
c) At a tire shop
d) At a police station

[Correct Answer]: b)
[Explain]: 有关 recreational trailer（休闲挂车）及 house trailer endorsement（房车挂车资格）的更多信息，可在 icbc.com 查询。
[Reference]: Chapter 1 – Recreational Trailer Information

#C01-06 What does transportation network services (TNS) do?

a) Connects mechanics to carriers
b) Connects drivers to passengers through an app
c) Connects police to dispatchers
d) Connects drivers to insurance companies

[Correct Answer]: b)
[Explain]: transportation network services（TNS，交通网络服务）通过 app（应用程序）连接司机与在线预约及付款的乘客。
[Reference]: Chapter 1 – Ride-hailing
