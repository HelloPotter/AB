<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Brake Practice System</title>
    <style>
        :root {
            --primary-color: #1a73e8;
            --primary-hover: #1557b0;
            --success-bg: #e6f4ea;
            --success-text: #137333;
            --error-bg: #fce8e6;
            --error-text: rgb(175, 0, 0);
            --bg-body: #f5f7f9;
            --text-main: #202124;
            --text-sub: #5f6368;
            --shadow-sm: 0 1px 2px 0 rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15);
            --fixed-width: 900px;
        }

        body { 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 居中标题与图标结合 */
        .header-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 40px 0 20px;
        }

        .brand-icon {
            background: var(--primary-color);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 2px 4px rgba(26,115,232,0.3);
        }

        .main-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0;
            color: var(--text-main);
        }

        .container { 
            width: var(--fixed-width); 
            margin: 0 auto; 
            padding: 0 0 60px; 
            flex: 1; 
        }

        /* 窄卡片控制栏 */
        .control-panel {
            background: #ffffff;
            border-radius: 8px;
            padding: 12px 24px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .status-info {
            display: flex;
            align-items: center;
            gap: 20px;
            color: var(--text-main);
            font-weight: 500;
            font-size: 0.95rem;
        }

        .timer-display {
            color: var(--error-text);
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* 答题卡片 */
        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow-sm);
            box-sizing: border-box;
            width: 100%;
        }

        .question-num {
            color: var(--primary-color);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
            display: block;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        /* 选项 */
        .options { list-style: none; padding: 0; margin-bottom: 0; }
        .option-item { 
            border: 1px solid #dadce0; 
            padding: 18px 24px; 
            margin-bottom: 12px; 
            cursor: pointer; 
            transition: all 0.2s; 
            border-radius: 8px; 
            font-size: 1.05rem;
            display: flex;
            align-items: center;
        }
        .option-item:hover { background-color: #f8f9fa; border-color: #bdc1c6; }
        .option-item.correct { background-color: var(--success-bg); border-color: #34a853; color: var(--success-text); font-weight: 500; }
        .option-item.wrong { background-color: var(--error-bg); border-color: #d93025; color: var(--error-text); }
        .option-item.disabled { pointer-events: none; }

        /* 反馈 */
        .feedback-panel { 
            margin-top: 24px; 
            padding: 24px; 
            border-radius: 8px; 
            background-color: #f8f9fa; 
            border-left: 4px solid var(--primary-color);
            display: none; 
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .feedback-label { color: var(--text-sub); font-size: 0.85rem; font-weight: 600; margin-top: 12px; display: block; }
        .feedback-content { color: var(--text-main); font-size: 0.95rem; margin-top: 4px; }

        /* 按钮 */
        .btn-group { display: flex; gap: 8px; }
        button { 
            border: none; padding: 10px 20px; font-size: 0.9rem; font-weight: 500; 
            cursor: pointer; border-radius: 6px; transition: 0.2s; 
        }
        .btn-main { background-color: var(--primary-color); color: white; }
        .btn-main:hover { background-color: var(--primary-hover); }
        .btn-ghost { background-color: transparent; border: 1px solid #dadce0; color: var(--text-sub); }
        .btn-ghost:hover { background-color: #f1f3f4; color: var(--text-main); }

        /* 底部 */
        footer {
            text-align: center;
            padding: 30px;
            color: var(--text-sub);
            font-size: 0.85rem;
            border-top: 1px solid #dadce0;
            background: #fff;
            margin-top: auto;
        }

        .wrong-card { background: white; padding: 24px; border-radius: 8px; margin-bottom: 16px; border: 1px solid #dadce0; }

        @media (max-width: 840px) {
            .container { width: 95%; }
            .card { padding: 30px; }
            .header-section { margin: 20px 0; }
        }
    </style>
</head>
<body>

<header class="header-section">
    <div class="brand-icon">AB</div>
    <h1 class="main-title">Air Brake Practice</h1>
</header>

<div class="container">
    <div class="control-panel" id="controlPanel">
        <div class="status-info">
            <span id="questionCounter">Question 0 / 25</span>
            <span class="timer-display" id="timerDisplay">30:00</span>
            <span id="modeDisplay" style="font-size: 0.8rem; color: var(--text-sub);">Mock Exam</span>
        </div>
        <div class="btn-group">
            <button onclick="showWrongBank()" class="btn-ghost">Wrong Questions</button>
            <button onclick="skipQuestion()" id="btnSkip" class="btn-ghost">Skip</button>
            <button onclick="nextQuestion()" id="btnNext" class="btn-main" style="display:none;">Next</button>
        </div>
    </div>

    <div id="quizContainer">
        <div class="card">
            <span class="question-num" id="qCodeDisplay">#CODE</span>
            <div id="questionArea"></div>
        </div>
    </div>

    <div id="resultScreen" style="display:none;" class="card">
        <div style="text-align:center">
            <h1 id="scoreStatus" style="font-size: 2.5rem; margin-bottom: 8px;"></h1>
            <p id="scoreDetail" style="font-size: 1.1rem; color: var(--text-sub); margin-bottom: 40px;"></p>
            <button onclick="showReview()" class="btn-ghost" style="margin-right:12px">Review History</button>
            <button onclick="restartSim()" class="btn-main">Restart Test</button>
        </div>
    </div>

    <div id="wrongBankScreen" style="display:none;">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h2 style="margin:0">Incorrect Question Bank</h2>
            <div>
                <button onclick="startWrongPractice()" id="btnPracticeWrong" class="btn-main" style="background:#2e7d32; margin-right:8px;">Practice Mode</button>
                <button onclick="hideWrongBank()" class="btn-ghost">Close</button>
            </div>
        </div>
        <div id="wrongBankList"></div>
    </div>

    <div id="reviewScreen" style="display:none;" class="card">
        <h2 style="margin-top:0; margin-bottom:24px; border-bottom:1px solid #eee; padding-bottom:16px">Test Review</h2>
        <div id="reviewList"></div>
        <button onclick="restartSim()" class="btn-main" style="margin-top:20px">New Test</button>
    </div>
</div>

<footer>
    &copy; 2026 Air Brake Practice. All rights reserved. Designed by Stone Zhao.
</footer>

<script>
// 题库数据占位
const rawData = `
#R1-1 What devices introduce a small amount of alcohol vapour into the air system?
a) Air dryers
b) Front wheel limiting systems
c) Injectors and evaporators
[Correct Answer] 正确答案： c)
[Explain] 解释：在寒冷气候下，为了防止气路结冰，系统会使用 Injectors and evaporators（喷射器和蒸发器）向空气系统引入少量的 Alcohol vapour（酒精蒸气），以降低水分的 Freezing point（凝固点）。
[Page] 参考手册页码：181

#R1-2 Compressors must build air in the reservoirs with engine rpm between 1,000 to 1,200:
a) Up to 90 psi within 3 minutes
b) From 50 psi to 100 psi within 3 minutes
c) From 50 psi to 90 psi within 3 minutes
d) From 50 psi to 90 psi within 1 minutes
[Correct Answer] 正确答案： c)
[Explain] 解释：这是衡量 Compressor（压缩机）性能的标准。在发动机处于规定转速时，压力从 50 psi 升高到 90 psi 的 Build air（建压/打气）过程时间不得超过 3 分钟。
[Page] 参考手册页码：208

#R1-3 When air pressure reaches its operating maximum, the compressor is?
a) Stopped
b) Unloaded
c) Uncoupled
[Correct Answer] 正确答案： b)
[Explain] 解释：当气压达到 Cut-out（切断压力/运行最大值）时，Governor（调速器）会使压缩机进入 Unloaded（卸载/空转）循环，此时压缩机仍在旋转但不产生压缩空气。
[Page] 参考手册页码：155

#R1-4 How does a driver test the air dryer to ensure it is working properly?
a) They can only be tested by a qualified mechanic
b) Open the wet tank and check for moisture
c) Air dryers are no longer used for air brake systems
[Correct Answer] 正确答案： b)
[Explain] 解释：检查 Air dryer（空气干燥器）效能的方法是打开 Wet tank（湿罐/第一储气罐）的排水阀。如果排出的水分极少，说明干燥器工作正常；若有大量 Moisture（水分/湿气），则需要维修。
[Page] 参考手册页码：181

#R1-5 What must the driver do if the low air warning activates while the vehicle is in service?
a) Pull over at the next rest stop
b) Call dispatch and ask for help
c) Apply hazards and pull over immediately to check
[Correct Answer] 正确答案： c)
[Explain] 解释：行车中 Low air warning（低压报警）激活代表制动系统存在安全隐患。驾驶员必须开启 Hazards（危险报警闪光灯/双闪）并 Immediately（立即）安全靠边停车。
[Page] 参考手册页码：157

#R1-6 What valve prevents failure of air accessories from totally depleting the system?
a) Pressure protection valve
b) One way check valve
c) Safety valve
[Correct Answer] 正确答案： a)
[Explain] 解释：Pressure protection valve（压力保护阀）用于保护主制动系统。当 Air accessories（空气辅助设备/附件）发生严重泄漏时，该阀会在压力过低前关闭，防止系统压力被完全 Depleting（耗尽）。
[Page] 参考手册页码：184

#R1-7 What is the maximum pressure available for brake application?
a) 125 psi
b) 150 psi
c) Reservoir Pressure
[Correct Answer] 正确答案： c)
[Explain] 解释：Brake application（施加制动/踩刹车）时可用的最大压力受限于 Reservoirs（储气罐）中当前储存的 Reservoir Pressure（储气罐压力）。
[Page] 参考手册页码：154

#R1-8 Water in the reservoirs is harmful because?
a) Water corrodes the metal components
b) It freezes in cold weather
c) It cuts down the volume of air in the reservoir
[Correct Answer] 正确答案： b)
[Explain] 解释：虽然积水会导致腐蚀，但在 BC 省的手册标准中，最危险的因素是水分在低温下会 Freezes（结冰），这可能导致阀门失灵或管路堵塞。
[Page] 参考手册页码：156

#R1-9 Maximum reservoir pressure must be between what two pressures?
a) 125 psi and 150 psi
b) 105 psi and 135 psi
c) 50 psi and 90 psi
[Correct Answer] 正确答案： b)
[Explain] 解释：调速器控制的 Maximum reservoir pressure（最高储气罐压力/切断压力）法定范围必须在 105 psi 到 135 psi 之间。
[Page] 参考手册页码：155

#R1-10 If a small leak develops in a brake chamber, what valve will maintain the application pressure?
a) Quick release
b) Treadle or foot
c) Flux capacitor
d) Poppet
[Correct Answer] 正确答案： b)
[Explain] 解释：Treadle or foot valve（脚踏阀/制动阀）具有补偿功能。如果 Brake chamber（制动气室）有微小泄漏，该阀会持续供气以 Maintain（维持）驾驶员设定的制动压力。
[Page] 参考手册页码：158

#R1-11 At what pressure should the low air pressure warning device activate?
a) 40 psi
b) 85 psi
c) 60 psi
[Correct Answer] 正确答案： c)
[Explain] 解释：Low air pressure warning device（低压报警装置）必须在压力降至 60 psi 或以上时 Activate（激活）。
[Page] 参考手册页码：157

#R1-12 Belt driven air compressors should have the belt checked for cracks and adjustment:
a) Daily
b) Weekly
c) Monthly
[Correct Answer] 正确答案： a)
[Explain] 解释：对于皮带驱动的压缩机，检查皮带是否有 Cracks（裂纹）和 Adjustment（松紧度调节）是 Daily（每天）行前检查的强制要求。
[Page] 参考手册页码：204

#R1-13 What causes moisture to form in the air brake system?
a) Engine coolant leaking into the system
b) Air warms up in the wet tank and condenses
c) Compressed air becomes hot, then cools, creating condensation
[Correct Answer] 正确答案： c)
[Explain] 解释：空气在被压缩时会升温并携带水分，当热空气进入储气罐冷却（Cools）后，水分析出形成 Condensation（冷凝/积水）。
[Page] 参考手册页码：156

#R1-14 How are most compressors lubricated today?
a) By an oil supply in the compressor
b) From the engine lubricating system
c) From the transmission lubricating system
[Correct Answer] 正确答案： b)
[Explain] 解释：现代大多数商用车压缩机通过连接到 Engine lubricating system（发动机润滑系统/机油系统）来获取润滑。
[Page] 参考手册页码：155

#R1-15 If the compressor discharge line is broken, what prevents total loss of air?
a) The One-Way Check Valve
b) The Governor Valve
c) The Two-Way Check Valve
[Correct Answer] 正确答案： a)
[Explain] 解释：如果连接压缩机的 Discharge line（排出管）破裂，储气罐进气口的 One-Way Check Valve（单向止回阀）会立即关闭，防止空气 Backflow（回流/倒流）。
[Page] 参考手册页码：156

#R1-16 The reservoir gauge reads:
a) Wet tank pressure
b) Compressor performance
c) Pressure available for service
[Correct Answer] 正确答案： c)
[Explain] 解释：仪表盘上的 Reservoir gauge（储气罐压力表）显示的读数反映了当前可用于 Service brake（行车制动/服务制动）的空气压力。
[Page] 参考手册页码：157

#R1-17 The 5 main components of the air brake system are:
a) Compressor with governor, one way check valve, reservoir gauge, foot valve, foundation brakes
b) Compressor with governor, air lines, reservoir, foot valve, foundation brakes
c) Compressor, air lines, reservoir gauge, brake pedal, brake chambers
[Correct Answer] 正确答案： b)
[Explain] 解释：气刹系统由五个核心部分组成：带调速器的 Compressor（压缩机）、Air lines（气路管线）、Reservoir（储气罐）、Foot valve（脚踏阀/制动阀）以及车轮端的 Foundation brakes（基础刹车机械部分）。
[Page] 参考手册页码：154

#R2-1 If you double the speed of a vehicle, how much more stopping power is required to stop in the same distance?
a) Two times the stopping power
b) Four times the stopping power
c) Eight times the stopping power
[Correct Answer] 正确答案： b)
[Explain] 解释：根据物理定律，Stopping power（制动力/能量）与速度的平方成正比。如果 Speed（速度）翻倍，动能变为 4 倍，因此在相同距离内停下需要 4 倍的制动力。
[Page] 参考手册页码：149

#R2-2 An automatic front wheel limiting valve is overridden completely when application pressure exceeds:
a) 30 psi
b) 60 psi
c) 90 psi
[Correct Answer] 正确答案： b)
[Explain] 解释：Automatic front wheel limiting valve（自动前轮限制阀）在轻微制动时会减少前轮压力。但当 Application pressure（施加压力/踩刹车压力）超过 60 psi 时，该功能会被 Overridden（覆盖/失效），系统将向前轮提供全额压力。
[Page] 参考手册页码：182

#R2-3 What is meant by the term “Brake Lag”?
a) A wheel chock to keep the vehicle from moving
b) The 4/10s of a second delay the relay valve now eliminates
c) The time between stepping on or applying the foot valve, and when the brakes begin to function (shoes against drums)
[Correct Answer] 正确答案： c)
[Explain] 解释：Brake Lag（制动延迟）是指从驾驶员踩下 Foot valve（脚踏阀）开始，到空气传输至气室并使 Brake shoes（刹车蹄）接触 Brake drums（刹车鼓）产生制动作用之间的时间差。
[Page] 参考手册页码：153

#R2-4 If 40 psi is exerted against a diaphragm that is 30 square inches, what is the total force exerted?
a) 1200 lbs
b) 1200 psi
c) 1200 km/h
[Correct Answer] 正确答案： a)
[Explain] 解释：Total force（总推力）的计算方式是 Air pressure（气压）乘以 Diaphragm（隔膜）的面积。40 psi × 30 sq. in. = 1200 lbs（磅）。
[Page] 参考手册页码：152

#R2-5 Stopping distance of a vehicle is most affected by?
a) The condition of the brakes
b) The condition and surface of the road
c) The speed of the vehicle
d) The grade or steepness of the road
[Correct Answer] 正确答案： c)
[Explain] 解释：虽然路况和制动器状态都很重要，但 Speed（速度）是对 Stopping distance（制动距离）影响最大的因素，因为能量随速度平方增长。
[Page] 参考手册页码：149

#R2-6 What is a “bob-tail” proportioning valve?
a) Increases rear brake pressure
b) Prevents lock-up of rear brakes when trailer is not connected
c) Allows driver to make lighter brake applications
d) Allows you to move a disabled vehicle to the shop
[Correct Answer] 正确答案： b)
[Explain] 解释：Bob-tail proportioning valve（单机头比例阀）用于单机拖头行驶（未挂拖车）时，通过减少后轴制动压力来防止轻载的后轮发生 Lock-up（抱死/打滑）。
[Page] 参考手册页码：182

#R2-7 What is the main purpose of a relay valve?
a) To reduce the application pressure to the front brake chambers
b) To relay reservoir air directly to the treadle valve
c) To reduce lag time when rear brakes are applied
[Correct Answer] 正确答案： c)
[Explain] 解释：Relay valve（继动阀）靠近后轮气室安装，其主要作用是直接从储气罐向气室供气，从而缩短空气传输距离，减少后轮制动的 Lag time（延迟时间）。
[Page] 参考手册页码：163

#R2-8 What is the lowest pressure before the governor must cause the compressor to reload, and rebuild reservoir pressure?
a) 60 psi
b) 80 - 85 psi
c) 105 - 135 psi
[Correct Answer] 正确答案： b)
[Explain] 解释：Governor（调速器）必须在压力下降到 80 - 85 psi 之前（即 Cut-in 压力点）指令压缩机重新开始打气，以 Rebuild（重建）系统压力。
[Page] 参考手册页码：155

#R2-9 What are “foundation brakes”?
a) The mechanical parts of the brake assembly at the wheel
b) Brakes only on airbrake equipped trailers
c) Brakes used on buses only
d) The mechanical parts of the brake assembly used in hydraulic brake systems only
[Correct Answer] 正确答案： a)
[Explain] 解释：Foundation brakes（基础刹车）是指车轮端的机械结构部分，通常包括 Brake drums（刹车鼓）、Shoes（蹄片）、S-cam（S凸轮）和 Slack adjusters（间隙调节器）等。
[Page] 参考手册页码：154

#R2-10 What is the purpose of a quick release valve?
a) To release air faster reducing brake lag
b) To release air faster allowing the service brakes to release quicker
c) To allow air to escape quickly from the treadle valve
[Correct Answer] 正确答案： b)
[Explain] 解释：Quick release valve（快速释放阀）的作用是允许空气直接从该阀排出，而不是返回通过长长的管路回到脚踏阀排出，从而使 Service brakes（行车制动）能更迅速地 Release（解除/松开）。
[Page] 参考手册页码：162

#R2-11 What is the final factor that will determine if the vehicle will move?
a) The amount of power
b) The amount of friction
c) The amount of traction
[Correct Answer] 正确答案： c)
[Explain] 解释：无论有多少动力，Traction（牵引力/附着力）才是决定车辆是否能移动或停止的最终物理限制因素，它取决于轮胎与路面之间的握持力。
[Page] 参考手册页码：147

#R2-12 What is meant by braking distance?
a) The actual distance the vehicle travels after the brakes have applied, until the vehicle stops
b) The actual distance the vehicle travels from the moment a hazard is recognized to the time the vehicle stops
c) The actual distance the air travels through a properly maintained air-brake system
[Correct Answer] 正确答案： a)
[Explain] 解释：Braking distance（制动距离）特指从制动器正式起作用（Applied）那一刻起，直到车辆完全停稳所经过的距离。
[Page] 参考手册页码：150

#R2-13 If the speed and weight of a vehicle is doubled, how many times must the stopping power be increased to be able to stop in the same distance?
a) 2 times
b) 4 times
c) 6 times
d) 8 times

`;

let allQuestions = [];
let quizQuestions = [];
let currentIdx = 0;
let userAnswers = [];
let wrongBank = JSON.parse(localStorage.getItem('airBrakeWrongBank')) || [];
let timeLeft = 30 * 60;
let timerInterval = null;
let isWrongPracticeMode = false;

function parseData() {
    const blocks = rawData.split(/(?=#R\d+-\d+)/).filter(b => b.trim().length > 0);
    allQuestions = blocks.map((block) => {
        const lines = block.trim().split('\n');
        const codeMatch = lines[0].match(/#R\d+-\d+/);
        const code = codeMatch ? codeMatch[0] : "N/A";
        const questionText = lines[0].replace(code, "").trim();
        const options = [];
        let correctAnswer = "", explain = "", page = "";
        lines.slice(1).forEach(line => {
            const l = line.trim();
            if (/^[a-d]\)/.test(l)) options.push(l);
            else if (l.includes('[Correct Answer]')) correctAnswer = l.split('：')[1].trim().replace(')', '');
            else if (l.includes('[Explain]')) explain = l.replace('[Explain] 解释：', '');
            else if (l.includes('[Page]')) page = l.replace('[Page] 参考手册页码：', '');
        });
        return { code, q: questionText, options, ans: correctAnswer, explain, page };
    });
}

function initQuiz() {
    isWrongPracticeMode = false;
    quizQuestions = [...allQuestions].sort(() => 0.5 - Math.random()).slice(0, 25);
    document.getElementById('modeDisplay').innerHTML = 'Mock Exam';
    document.getElementById('timerDisplay').style.display = 'inline';
    startSession();
}

function startSession() {
    currentIdx = 0; userAnswers = [];
    document.getElementById('quizContainer').style.display = 'block';
    document.getElementById('resultScreen').style.display = 'none';
    document.getElementById('reviewScreen').style.display = 'none';
    document.getElementById('wrongBankScreen').style.display = 'none';
    document.getElementById('controlPanel').style.display = 'flex';
    if (!isWrongPracticeMode) startTimer();
    renderQuestion();
}

function startTimer() {
    clearInterval(timerInterval);
    timeLeft = 30 * 60;
    timerInterval = setInterval(() => {
        timeLeft--;
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        document.getElementById('timerDisplay').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        if (timeLeft <= 0) { clearInterval(timerInterval); finishQuiz(); }
    }, 1000);
}

function renderQuestion() {
    const q = quizQuestions[currentIdx];
    document.getElementById('questionCounter').innerText = `Question ${currentIdx + 1} / ${quizQuestions.length}`;
    document.getElementById('qCodeDisplay').innerText = `ID: ${q.code}`;
    
    let html = `
        <div class="question-text">${q.q}</div>
        <ul class="options">
            ${q.options.map(opt => `<li class="option-item" onclick="checkAnswer('${opt.charAt(0)}', this)">${opt}</li>`).join('')}
        </ul>
        <div id="feedbackArea" class="feedback-panel">
            <div id="feedbackTitle" style="font-weight:700; font-size:1.1rem; margin-bottom:8px;"></div>
            <span class="feedback-label">Explanation</span>
            <div class="feedback-content">${q.explain}</div>
            <span class="feedback-label">Manual Reference</span>
            <div class="feedback-content">Page ${q.page}</div>
        </div>
    `;
    document.getElementById('questionArea').innerHTML = html;
    document.getElementById('btnSkip').style.display = isWrongPracticeMode ? 'none' : 'inline-block';
    document.getElementById('btnNext').style.display = 'none';
}

function checkAnswer(choice, element) {
    const q = quizQuestions[currentIdx];
    const isCorrect = choice === q.ans;
    const items = document.querySelectorAll('.option-item');
    items.forEach(item => {
        item.classList.add('disabled');
        if (item.innerText.startsWith(q.ans)) item.classList.add('correct');
    });

    const title = document.getElementById('feedbackTitle');
    if (!isCorrect) {
        element.classList.add('wrong');
        title.innerHTML = `<span style="color:var(--error-text)">✘ Incorrect</span>`;
        if (!isWrongPracticeMode && !wrongBank.some(w => w.code === q.code)) {
            wrongBank.push(q); saveBank();
        }
    } else {
        title.innerHTML = `<span style="color:var(--success-text)">✔ Correct</span>`;
    }

    userAnswers.push({ qIndex: currentIdx, choice, isCorrect });
    document.getElementById('feedbackArea').style.display = 'block';
    document.getElementById('btnSkip').style.display = 'none';
    document.getElementById('btnNext').style.display = 'inline-block';
}

function nextQuestion() {
    if (currentIdx < quizQuestions.length - 1) {
        currentIdx++; renderQuestion();
    } else {
        if (isWrongPracticeMode) {
            alert("Practice complete. Clearing correct questions from bank.");
            wrongBank = []; saveBank(); showWrongBank();
        } else { finishQuiz(); }
    }
}

function finishQuiz() {
    clearInterval(timerInterval);
    document.getElementById('quizContainer').style.display = 'none';
    document.getElementById('controlPanel').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'block';
    const correctCount = userAnswers.filter(a => a.isCorrect).length;
    const score = correctCount * 4;
    document.getElementById('scoreStatus').innerText = score >= 80 ? "PASS" : "FAIL";
    document.getElementById('scoreStatus').style.color = score >= 80 ? "var(--success-text)" : "var(--error-text)";
    document.getElementById('scoreDetail').innerText = `Your score is ${score}%. (${correctCount} out of 25)`;
}

function showWrongBank() {
    document.getElementById('quizContainer').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'none';
    document.getElementById('controlPanel').style.display = 'none';
    document.getElementById('wrongBankScreen').style.display = 'block';
    document.getElementById('btnPracticeWrong').style.display = wrongBank.length > 0 ? 'inline-block' : 'none';
    let html = "";
    if (wrongBank.length === 0) {
        html = "<p style='text-align:center; padding:60px; color:var(--text-sub);'>No incorrect questions recorded yet.</p>";
    } else {
        wrongBank.forEach((q, idx) => {
            html += `
                <div class="wrong-card">
                    <div style="font-weight:600; margin-bottom:12px;">${idx+1}. ${q.q}</div>
                    <div style="font-size:0.85rem; color:var(--success-text); margin-bottom:10px; font-weight:600;">Correct Answer: ${q.ans} | ID: ${q.code}</div>
                    <div style="font-size:0.9rem; padding-top:10px; border-top:1px solid #f1f3f4;">${q.explain}</div>
                    <button onclick="removeFromBank('${q.code}')" class="btn-ghost" style="margin-top:16px; padding:6px 14px; font-size:0.8rem;">Remove</button>
                </div>`;
        });
    }
    document.getElementById('wrongBankList').innerHTML = html;
}

function startWrongPractice() {
    isWrongPracticeMode = true;
    quizQuestions = [...wrongBank];
    document.getElementById('modeDisplay').innerHTML = 'Practice Mode';
    document.getElementById('timerDisplay').style.display = 'none';
    startSession();
}

function skipQuestion() {
    let newQ;
    do { newQ = allQuestions[Math.floor(Math.random() * allQuestions.length)]; } 
    while (quizQuestions.some(x => x.code === newQ.code));
    quizQuestions.splice(currentIdx, 1, newQ);
    renderQuestion();
}

function showReview() {
    document.getElementById('resultScreen').style.display = 'none';
    document.getElementById('reviewScreen').style.display = 'block';
    let html = "";
    quizQuestions.forEach((q, idx) => {
        const userAns = userAnswers.find(a => a.qIndex === idx);
        html += `
            <div style="padding:16px 0; border-bottom:1px solid #f1f3f4;">
                <div style="font-weight:500;">${idx+1}. ${q.q}</div>
                <div style="font-size:0.9rem; margin-top:4px; color:${userAns?.isCorrect ? 'var(--success-text)' : 'var(--error-text)'}">
                    Your choice: ${userAns ? userAns.choice : 'Skipped'} | Correct: ${q.ans}
                </div>
            </div>`;
    });
    document.getElementById('reviewList').innerHTML = html;
}

function removeFromBank(code) { wrongBank = wrongBank.filter(w => w.code !== code); saveBank(); showWrongBank(); }
function saveBank() { localStorage.setItem('airBrakeWrongBank', JSON.stringify(wrongBank)); }
function hideWrongBank() { document.getElementById('wrongBankScreen').style.display = 'none'; startSession(); }
function restartSim() { if (confirm("Start a new test? Current progress will be lost.")) initQuiz(); }

parseData();
initQuiz();
</script>
